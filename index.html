function LoginScreen({pins,onLogin}){
  const[pin,setPin]=useState("");
  const[err,setErr]=useState(false);
  const[shake,setShake]=useState(false);
  const tap=(d)=>{
    if(pin.length>=4)return;
    const next=pin+d;
    setPin(next);
    if(next.length===4){
      const user=pins.find(u=>u.pin===next);
      if(user){onLogin(user);}
      else{setErr(true);setShake(true);setTimeout(()=>{setPin("");setErr(false);setShake(false);},800);}
    }
  };
  const del=()=>setPin(p=>p.slice(0,-1));
  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#ea580c 0%,#c2410c 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{marginBottom:32,textAlign:"center"}}>
        <div style={{fontSize:64,marginBottom:8}}>👷</div>
        <div style={{color:"white",fontSize:28,fontWeight:800,letterSpacing:"-0.5px"}}>N&W Admin</div>
        <div style={{color:"rgba(255,255,255,0.75)",fontSize:14,marginTop:4}}>N&W Construction Corp</div>
      </div>
      <div style={{background:"white",borderRadius:24,padding:"28px 24px",width:"100%",maxWidth:320,boxShadow:"0 20px 60px rgba(0,0,0,0.25)"}}>
        <div style={{fontSize:14,fontWeight:600,color:"var(--muted)",textAlign:"center",marginBottom:20}}>Ingresa tu PIN</div>
        <div style={{display:"flex",justifyContent:"center",gap:14,marginBottom:24,animation:shake?"shake 0.5s":"none"}}>
          {[0,1,2,3].map(i=><div key={i} style={{width:14,height:14,borderRadius:"50%",background:pin.length>i?"var(--orange)":"var(--border)",transition:"all 0.15s",transform:pin.length>i?"scale(1.1)":"scale(1)"}}/>)}
        </div>
        {err&&<div style={{textAlign:"center",color:"var(--red)",fontSize:13,fontWeight:600,marginBottom:16}}>PIN incorrecto. Intenta de nuevo.</div>}
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
          {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((d,i)=>(
            <button key={i} onClick={()=>d==="⌫"?del():d!==""&&tap(String(d))} style={{padding:"16px 0",fontSize:d==="⌫"?18:20,fontWeight:600,background:d===""?"transparent":"var(--surface)",border:d===""?"none":"1.5px solid var(--border)",borderRadius:12,cursor:d===""?"default":"pointer",color:d==="⌫"?"var(--red)":"var(--text)",transition:"all 0.1s",WebkitTapHighlightColor:"transparent"}}>{d}</button>
          ))}
        </div>
        <div style={{marginTop:20,fontSize:11,color:"var(--muted)",textAlign:"center",lineHeight:1.6}}>
          Hansel: 1234 · Noel: 5678<br/>Jackson: 9012 · Eddy: 3456
        </div>
      </div>
    </div>
  );
}

function useToasts(){
  const[toasts,setToasts]=useState([]);
  const add=useCallback((msg,type="success")=>{const id=Date.now();setToasts(t=>[...t,{id,msg,type}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3500);},[]);
  return{toasts,add};
}
function Toasts({toasts}){
  if(!toasts.length)return null;
  const colors={success:{bg:"var(--green-l)",border:"var(--green-b)",text:"var(--green)"},error:{bg:"var(--red-l)",border:"var(--red-b)",text:"var(--red)"},info:{bg:"var(--blue-l)",border:"var(--blue-b)",text:"var(--blue)"}};
  return<div style={{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",zIndex:9999,display:"flex",flexDirection:"column",gap:8,width:"calc(100% - 32px)",maxWidth:400}}>
    {toasts.map(t=>{const c=colors[t.type]||colors.success;return<div key={t.id} className="fade" style={{background:c.bg,border:`1px solid ${c.border}`,color:c.text,padding:"12px 16px",borderRadius:12,fontSize:14,fontWeight:500,boxShadow:"var(--shadow-md)",textAlign:"center"}}>{t.msg}</div>;})}
  </div>;
}

/* ─── DASHBOARD ─── */
function Dashboard({projects,timeEntries,workers,purchases,expenses,reimb,onViewProject}){
  const totalContract=projects.reduce((s,p)=>s+p.contractValue,0);
  const totalCobrado=projects.reduce((s,p)=>s+p.payApps.filter(pa=>pa.status==="Paid").reduce((ss,pa)=>ss+pa.amount,0),0);
  const totalPorCobrar=projects.reduce((s,p)=>s+p.payApps.filter(pa=>pa.status==="Sent").reduce((ss,pa)=>ss+pa.amount,0),0);
  const totalLabor=timeEntries.filter(e=>e.hours>0).reduce((s,e)=>{const w=workers.find(w=>w.id===e.workerId);return s+entryCost(e,w);},0);
  const totalMat=purchases.reduce((s,p)=>s+p.amount,0);
  const totalGastos=totalLabor+totalMat+expenses.reduce((s,e)=>s+e.amount,0);
  const saldoEmpresa=totalCobrado-totalGastos;
  return(
    <div style={{paddingBottom:16}}>
      <div style={{padding:"16px 16px 0"}}>
        <div style={{fontSize:13,color:"var(--muted)",marginBottom:4}}>Resumen empresa</div>
        <div style={{fontSize:26,fontWeight:800,color:"var(--text)",marginBottom:16}}>N&W Construction</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
          <KpiCard label="Contrato total" value={f$(totalContract)} sub={projects.length+" proyectos activos"} color="slate" icon="📋"/>
          <KpiCard label="Cobrado" value={f$(totalCobrado)} sub={"Por cobrar: "+f$(totalPorCobrar)} color="green" icon="✅"/>
          <KpiCard label="Gastos totales" value={f$(totalGastos)} sub={"Labor: "+f$(totalLabor)} color="red" icon="📤"/>
          <KpiCard label="Saldo empresa" value={f$(saldoEmpresa)} sub={saldoEmpresa>=0?"Positivo ✓":"Déficit ⚠️"} color={saldoEmpresa>=0?"green":"red"} icon="💰"/>
        </div>
      </div>
      <div style={{padding:"0 16px"}}>
        <div style={{fontSize:14,fontWeight:700,color:"var(--text)",marginBottom:10,marginTop:8}}>Proyectos activos</div>
        {projects.map(p=>{
          const cobrado=p.payApps.filter(pa=>pa.status==="Paid").reduce((s,pa)=>s+pa.amount,0);
          const porCobrar=p.payApps.filter(pa=>pa.status==="Sent").reduce((s,pa)=>s+pa.amount,0);
          const laborP=timeEntries.filter(e=>e.projectId===p.id&&e.hours>0).reduce((s,e)=>{const w=workers.find(w=>w.id===e.workerId);return s+entryCost(e,w);},0);
          const matP=purchases.filter(pu=>pu.projectId===p.id).reduce((s,pu)=>s+pu.amount,0);
          const saldo=cobrado-laborP-matP;
          return(
            <Card key={p.id} style={{marginBottom:12,cursor:"pointer"}} onClick={()=>onViewProject(p.id)}>
              <div style={{padding:"16px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:16,marginBottom:2}}>{p.name}</div>
                    <div style={{fontSize:12,color:"var(--muted)"}}>{p.client||"Sin cliente"}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:11,color:"var(--muted)"}}>Saldo</div>
                    <div style={{fontSize:18,fontWeight:700,color:saldo>=0?"var(--green)":"var(--red)",fontFamily:M}}>{f$(saldo)}</div>
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
                  <div style={{background:"var(--green-l)",borderRadius:10,padding:"8px 10px"}}>
                    <div style={{fontSize:10,color:"var(--green)",fontWeight:600,marginBottom:2}}>COBRADO</div>
                    <div style={{fontSize:14,fontWeight:700,color:"var(--green)",fontFamily:M}}>{f$(cobrado)}</div>
                  </div>
                  <div style={{background:"var(--orange-l)",borderRadius:10,padding:"8px 10px"}}>
                    <div style={{fontSize:10,color:"var(--orange-d)",fontWeight:600,marginBottom:2}}>P/COBRAR</div>
                    <div style={{fontSize:14,fontWeight:700,color:"var(--orange-d)",fontFamily:M}}>{f$(porCobrar)}</div>
                  </div>
                  <div style={{background:"var(--red-l)",borderRadius:10,padding:"8px 10px"}}>
                    <div style={{fontSize:10,color:"var(--red)",fontWeight:600,marginBottom:2}}>GASTOS</div>
                    <div style={{fontSize:14,fontWeight:700,color:"var(--red)",fontFamily:M}}>{f$(laborP+matP)}</div>
                  </div>
                </div>
                <ProgressBar value={cobrado} max={p.contractValue}/>
                <div style={{fontSize:11,color:"var(--muted)",marginTop:4}}>{pct(cobrado,p.contractValue)}% cobrado de {f$(p.contractValue)}</div>
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );

/* ─── TIME CLOCK ─── */
function TimeClock({projects,workers,setWorkers,timeEntries,setTimeEntries,pending,setPending,role,user,toast}){
  const[pid,setPid]=useState(projects[0]?.id);
  const[selWids,setSelWids]=useState([]);
  const[date,setDate]=useState(TODAY);
  const[clockIn,setClockIn]=useState("07:00");
  const[clockOut,setClockOut]=useState("");
  const[dead,setDead]=useState(0);
  const[view,setView]=useState("clock");
  const[newW,setNewW]=useState({name:"",role:"Ayudante",notes:""});
  const[addingW,setAddingW]=useState(false);
  const h=calcH(clockIn,clockOut,dead);
  const proj=projects.find(p=>p.id===pid);

  const dayMap=useMemo(()=>{const m={};timeEntries.forEach(e=>{if(e.date===date)m[e.workerId]=e.projectId;});return m;},[timeEntries,date]);
  const getSt=(wid)=>{const a=dayMap[wid];return!a?"available":a===pid?"active":"unavailable";};

  const register=()=>{
    if(!selWids.length||!pid||!clockIn)return;
    const added=[];
    selWids.forEach(wid=>{
      if(timeEntries.find(e=>e.workerId===wid&&e.date===date&&e.projectId!==pid))return;
      added.push({id:Date.now()+Math.random(),projectId:pid,workerId:wid,date,clockIn,clockOut,hours:h>0?h:0,dead:dead||0});
    });
    if(added.length){setTimeEntries(p=>[...p,...added]);toast("✅ "+added.length+" entrada"+(added.length>1?"s":"")+" registrada"+(added.length>1?"s":""));setSelWids([]);setClockOut("");setDead(0);}
  };

  const todayLog=timeEntries.filter(e=>e.projectId===pid&&e.date===date);

  return(
    <div style={{paddingBottom:80}}>
      <div style={{padding:"12px 16px",background:"var(--orange-l)",borderBottom:"1px solid var(--orange-b)"}}>
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          {[["clock","⏱ Registro"],["log","📋 Log"],["nomina","💰 Nómina"]].map(([v,l])=>(
            <button key={v} onClick={()=>setView(v)} style={{flex:1,padding:"8px 4px",border:"none",borderRadius:8,background:view===v?"var(--orange)":"transparent",color:view===v?"white":"var(--orange-d)",fontWeight:600,fontSize:12,cursor:"pointer"}}>{l}</button>
          ))}
        </div>
        <Select value={pid} onChange={e=>setPid(+e.target.value)} style={{marginBottom:0}}>
          {projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
        </Select>
      </div>

      {view==="clock"&&<div style={{padding:"16px"}}>
        <div style={{fontSize:13,fontWeight:600,color:"var(--muted)",marginBottom:10}}>Selecciona trabajadores</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
          {workers.map(w=>{const st=getSt(w.id);const unavail=st==="unavailable";const sel=selWids.includes(w.id);
            return<button key={w.id} onClick={()=>{if(unavail)return;setSelWids(p=>sel?p.filter(x=>x!==w.id):[...p,w.id]);}} style={{padding:"12px",border:`2px solid ${sel?"var(--orange)":unavail?"var(--border)":"var(--border)"}`,borderRadius:12,background:sel?"var(--orange-l)":unavail?"var(--surface)":"white",cursor:unavail?"not-allowed":"pointer",textAlign:"left",opacity:unavail?0.5:1,position:"relative"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                <Avatar name={w.name} size={28}/>
                {sel&&<div style={{position:"absolute",top:8,right:8,background:"var(--orange)",color:"white",borderRadius:"50%",width:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700}}>✓</div>}
              </div>
              <div style={{fontSize:13,fontWeight:600,color:unavail?"var(--muted)":"var(--text)"}}>{w.name}</div>
              <div style={{fontSize:11,color:"var(--muted)"}}>{w.role}</div>
              {unavail&&<div style={{fontSize:10,color:"var(--red)",fontWeight:500,marginTop:2}}>En otro proyecto</div>}
            </button>;
          })}
        </div>
        {selWids.length>0&&<div style={{background:"var(--orange-l)",border:"1px solid var(--orange-b)",borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:13,color:"var(--orange-d)",fontWeight:500}}>{selWids.length} seleccionado{selWids.length>1?"s":""} · <span style={{cursor:"pointer",textDecoration:"underline"}} onClick={()=>setSelWids([])}>Limpiar</span></div>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
          <Input label="Fecha" type="date" value={date} onChange={e=>{setDate(e.target.value);setSelWids([]);}} style={{marginBottom:0}}/>
          <Input label="Entrada" type="time" value={clockIn} onChange={e=>setClockIn(e.target.value)} style={{marginBottom:0}}/>
          <Input label="Salida" type="time" value={clockOut} onChange={e=>setClockOut(e.target.value)} style={{marginBottom:0}}/>
          <div><div style={{fontSize:13,fontWeight:500,marginBottom:6}}>T. muerto (min)</div><input type="number" value={dead||""} onChange={e=>setDead(+e.target.value||0)} placeholder="0" style={{width:"100%",padding:"11px 14px",border:"1.5px solid var(--border)",borderRadius:10,fontSize:15}}/></div>
        </div>
        {h>0&&<div style={{background:"var(--green-l)",border:"1px solid var(--green-b)",borderRadius:10,padding:"10px 14px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:13,color:"var(--green)"}}>Horas netas</span>
          <span style={{fontSize:22,fontWeight:700,color:"var(--green)",fontFamily:M}}>{h}h</span>
        </div>}
        <Btn full onClick={register} disabled={!selWids.length||!clockIn}>{selWids.length>0?"Registrar "+selWids.length+" trabajador"+(selWids.length>1?"es":""):"Selecciona trabajadores primero"}</Btn>
        
        {(role==="foreman"||role==="supervisor")&&<>
          <Divider/>
          <button onClick={()=>setAddingW(!addingW)} style={{width:"100%",padding:"12px",border:"1.5px dashed var(--border)",borderRadius:12,background:"none",color:"var(--muted)",fontWeight:600,fontSize:14,cursor:"pointer"}}>+ Solicitar nuevo trabajador</button>
          {addingW&&<div style={{marginTop:12,background:"var(--blue-l)",border:"1px solid var(--blue-b)",borderRadius:12,padding:16}}>
            <Input label="Nombre" value={newW.name} onChange={e=>setNewW({...newW,name:e.target.value})} placeholder="Nombre completo"/>
            <Select label="Cargo" value={newW.role} onChange={e=>setNewW({...newW,role:e.target.value})}><option>Ayudante</option><option>Carpintero</option><option>Cabillero</option><option>General</option></Select>
            <Input label="Notas" value={newW.notes} onChange={e=>setNewW({...newW,notes:e.target.value})} placeholder="Info adicional..."/>
            <div style={{display:"flex",gap:8}}>
              <Btn onClick={()=>{if(!newW.name.trim())return;setPending(p=>[...p,{id:Date.now(),name:newW.name.trim(),role:newW.role,notes:newW.notes,date:TODAY,status:"pending"}]);setNewW({name:"",role:"Ayudante",notes:""});setAddingW(false);toast("Solicitud enviada");}} full>Enviar solicitud</Btn>
            </div>
          </div>}
        </>}
      </div>}

      {view==="log"&&<div style={{padding:"16px"}}>
        <Input label="Fecha" type="date" value={date} onChange={e=>setDate(e.target.value)}/>
        {todayLog.length===0?<Empty icon="📋" msg="Sin entradas" sub={"No hay registros para el "+date}/>:
        <div style={{display:"grid",gap:10}}>
          {todayLog.map(e=>{const w=workers.find(w=>w.id===e.workerId);return<Card key={e.id}>
            <div style={{padding:"12px 14px",display:"flex",alignItems:"center",gap:12}}>
              <Avatar name={w?.name} size={40}/>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:14}}>{w?.name}</div>
                <div style={{fontSize:12,color:"var(--muted)"}}>{e.clockIn||"—"} → {e.clockOut||"activo"}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:18,fontWeight:700,color:"var(--orange)",fontFamily:M}}>{e.hours}h</div>
                {role==="admin"&&<button onClick={()=>{if(confirm("¿Eliminar?"))setTimeEntries(p=>p.filter(x=>x.id!==e.id));}} style={{background:"none",border:"none",color:"var(--red)",fontSize:12,cursor:"pointer",fontWeight:500}}>Eliminar</button>}
              </div>
            </div>
          </Card>;})}
        </div>}
      </div>}

      {view==="nomina"&&<NominaView workers={workers} timeEntries={timeEntries} projects={projects} role={role}/>}
    </div>
  );
}

/* ─── NOMINA VIEW ─── */
function NominaView({workers,timeEntries,projects,role}){
  const[payDate,setPayDate]=useState(getThursdayStart(TODAY));
  const[viewMode,setViewMode]=useState("empleados"); // empleados | proyectos
  const payEnd=addDays(payDate,6);
  const entries=timeEntries.filter(e=>e.date>=payDate&&e.date<=payEnd&&e.hours>0);

  // Per employee
  const byEmployee=workers.map(w=>{
    const we=entries.filter(e=>e.workerId===w.id);
    if(!we.length)return null;
    const totalH=we.reduce((s,e)=>s+e.hours,0);
    const days=new Set(we.map(e=>e.date)).size;
    const cost=w.payType==="salary"?days*dailyRate(w):we.reduce((s,e)=>s+e.hours*(w.hourlyRate||0),0);
    const byProj=projects.map(p=>{
      const pe=we.filter(e=>e.projectId===p.id);
      if(!pe.length)return null;
      const ph=pe.reduce((s,e)=>s+e.hours,0);
      const pd=new Set(pe.map(e=>e.date)).size;
      const pc=w.payType==="salary"?pd*dailyRate(w):pe.reduce((s,e)=>s+e.hours*(w.hourlyRate||0),0);
      return{...p,hours:ph,days:pd,cost:pc};
    }).filter(Boolean);
    return{...w,totalH,days,cost,byProj};
  }).filter(Boolean);

  // Per project
  const byProject=projects.map(p=>{
    const pe=entries.filter(e=>e.projectId===p.id);
    if(!pe.length)return null;
    const totalH=pe.reduce((s,e)=>s+e.hours,0);
    const cost=pe.reduce((s,e)=>{const w=workers.find(w=>w.id===e.workerId);return s+entryCost(e,w);},0);
    const emps=workers.map(w=>{
      const we=pe.filter(e=>e.workerId===w.id);
      if(!we.length)return null;
      const wh=we.reduce((s,e)=>s+e.hours,0);
      const wd=new Set(we.map(e=>e.date)).size;
      const wc=w.payType==="salary"?wd*dailyRate(w):we.reduce((s,e)=>s+e.hours*(w.hourlyRate||0),0);
      return{...w,hours:wh,days:wd,cost:wc};
    }).filter(Boolean);
    return{...p,totalH,cost,emps};
  }).filter(Boolean);

  const grandTotal=byEmployee.reduce((s,w)=>s+w.cost,0);

  return<div style={{padding:16,paddingBottom:24}}>
    <div style={{marginBottom:12}}>
      <div style={{fontSize:13,fontWeight:500,marginBottom:6}}>Semana de pago (Jue→Mié)</div>
      <input type="date" value={payDate} onChange={e=>setPayDate(getThursdayStart(e.target.value))} style={{width:"100%",padding:"11px 14px",border:"1.5px solid var(--border)",borderRadius:10,fontSize:15}}/>
      <div style={{fontSize:12,color:"var(--muted)",marginTop:4}}>{payDate} → {payEnd}</div>
    </div>

    {byEmployee.length===0?<Empty icon="💰" msg="Sin horas registradas" sub="Selecciona otra semana"/>:<>
      {/* TOTAL */}
      <div style={{background:"var(--orange)",borderRadius:14,padding:"16px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{color:"rgba(255,255,255,0.8)",fontSize:12,fontWeight:600}}>TOTAL NÓMINA</div><div style={{color:"rgba(255,255,255,0.75)",fontSize:11,marginTop:2}}>{payDate} → {payEnd}</div></div>
        <div style={{color:"white",fontWeight:800,fontSize:26,fontFamily:M}}>{f$(grandTotal)}</div>
      </div>

      {/* VIEW TOGGLE */}
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        {[["empleados","👷 Por empleado"],["proyectos","🏗️ Por proyecto"]].map(([v,l])=>(
          <button key={v} onClick={()=>setViewMode(v)} style={{flex:1,padding:"9px",border:"none",borderRadius:10,background:viewMode===v?"var(--orange)":"var(--surface)",color:viewMode===v?"white":"var(--muted)",fontWeight:600,fontSize:12,cursor:"pointer"}}>{l}</button>
        ))}
      </div>

      {/* BY EMPLOYEE */}
      {viewMode==="empleados"&&<div style={{display:"grid",gap:10}}>
        {byEmployee.map(w=><Card key={w.id}>
          <div style={{padding:"14px 16px"}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:w.byProj.length>1?10:0}}>
              <Avatar name={w.name} size={44}/>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:15}}>{w.name}</div>
                <div style={{fontSize:12,color:"var(--muted)"}}>{w.role} · {w.days} día{w.days!==1?"s":""} · {w.totalH}h</div>
                <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{w.payType==="salary"?f$(dailyRate(w))+"/día":"$"+w.hourlyRate+"/hr"}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:22,fontWeight:800,color:"var(--orange)",fontFamily:M}}>{f$(w.cost)}</div>
              </div>
            </div>
            {w.byProj.length>0&&<>
              <div style={{height:1,background:"var(--border)",margin:"8px 0"}}/>
              {w.byProj.map(p=><div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0"}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <div style={{width:6,height:6,borderRadius:"50%",background:"var(--orange)",flexShrink:0}}/>
                  <span style={{fontSize:12,color:"var(--muted)"}}>{p.name}</span>
                  <span style={{fontSize:11,color:"var(--muted)"}}>· {p.days}d · {p.hours}h</span>
                </div>

/* ─── PROYECTOS ─── */
function Proyectos({projects,setProjects,timeEntries,workers,purchases,reimb,toast}){
  const[view,setView]=useState("list");
  const[selId,setSelId]=useState(null);
  const[addingPA,setAddingPA]=useState(false);
  const[paForm,setPaForm]=useState({description:"",amount:"",date:TODAY,status:"Draft"});
  const sel=projects.find(p=>p.id===selId);

  if(view==="detail"&&sel){
    const cobrado=sel.payApps.filter(pa=>pa.status==="Paid").reduce((s,pa)=>s+pa.amount,0);
    const porCobrar=sel.payApps.filter(pa=>pa.status==="Sent").reduce((s,pa)=>s+pa.amount,0);
    const total=sel.payApps.reduce((s,pa)=>s+pa.amount,0);
    const labor=timeEntries.filter(e=>e.projectId===sel.id&&e.hours>0).reduce((s,e)=>{const w=workers.find(w=>w.id===e.workerId);return s+entryCost(e,w);},0);
    const mat=purchases.filter(p=>p.projectId===sel.id).reduce((s,p)=>s+p.amount,0);
    const updPA=(id,st)=>setProjects(ps=>ps.map(p=>p.id!==sel.id?p:{...p,payApps:p.payApps.map(pa=>pa.id===id?{...pa,status:st}:pa)}));
    const addPA=()=>{if(!paForm.description||!paForm.amount)return;const invNum=nextPANum(sel);setProjects(ps=>ps.map(p=>p.id!==sel.id?p:{...p,payApps:[...p.payApps,{id:Date.now(),number:"PA-"+String(p.payApps.length+1).padStart(3,"0"),invNum,description:paForm.description,amount:+paForm.amount,date:paForm.date,status:paForm.status,isReimb:false}]}));setPaForm({description:"",amount:"",date:TODAY,status:"Draft"});setAddingPA(false);toast("PA agregada");};
    return<div style={{paddingBottom:80}}>
      <TopBar title={sel.name} onBack={()=>setView("list")}/>
      <div style={{padding:"16px"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
          <KpiCard label="Cobrado" value={f$(cobrado)} color="green" icon="✅"/>
          <KpiCard label="Por cobrar" value={f$(porCobrar)} color="orange" icon="📤"/>
          <KpiCard label="Labor" value={f$(labor)} color="red" icon="👷"/>
          <KpiCard label="Materiales" value={f$(mat)} color="purple" icon="🛒"/>
        </div>
        <div style={{background:"var(--green-l)",border:"1px solid var(--green-b)",borderRadius:12,padding:"14px 16px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:13,color:"var(--green)",fontWeight:600}}>Saldo neto</div>
          <div style={{fontSize:22,fontWeight:800,color:"var(--green)",fontFamily:M}}>{f$(cobrado-labor-mat)}</div>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontSize:15,fontWeight:700}}>Pay Applications</div>
          <Btn size="sm" onClick={()=>setAddingPA(!addingPA)}>+ Nueva PA</Btn>
        </div>
        {addingPA&&<Card style={{marginBottom:12}}>
          <div style={{padding:16,background:"var(--orange-l)"}}>
            <div style={{fontSize:12,color:"var(--orange-d)",marginBottom:10,fontWeight:500}}>Invoice # auto: {nextPANum(sel)}</div>
            <Input label="Descripción" value={paForm.description} onChange={e=>setPaForm({...paForm,description:e.target.value})} placeholder="Invoice Labors — Semana..."/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <Input label="Monto ($)" type="number" value={paForm.amount} onChange={e=>setPaForm({...paForm,amount:e.target.value})}/>
              <Input label="Fecha" type="date" value={paForm.date} onChange={e=>setPaForm({...paForm,date:e.target.value})}/>
            </div>
            <Select label="Estado" value={paForm.status} onChange={e=>setPaForm({...paForm,status:e.target.value})}><option>Draft</option><option>Sent</option><option>Paid</option></Select>
            <div style={{display:"flex",gap:8}}><Btn onClick={addPA} full>Agregar</Btn></div>
          </div>
        </Card>}
        {sel.payApps.length===0?<Empty icon="📄" msg="Sin Pay Applications" sub="Agrega la primera PA"/>:
        <div style={{display:"grid",gap:10}}>
          {sel.payApps.map(pa=><Card key={pa.id}>
            <div style={{padding:"14px 16px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <div>
                  <div style={{fontFamily:M,fontSize:11,color:"var(--orange)",fontWeight:600}}>{pa.number} · {pa.invNum}</div>
                  <div style={{fontSize:14,fontWeight:600,marginTop:2}}>{pa.description}</div>
                  <div style={{fontSize:12,color:"var(--muted)",marginTop:2}}>{fmtDate(pa.date)}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:20,fontWeight:800,fontFamily:M,color:"var(--text)"}}>{f$(pa.amount)}</div>
                  <div style={{marginTop:4}}><Pill label={pa.status==="Paid"?"Cobrado":pa.status==="Sent"?"Por cobrar":"Borrador"} color={pa.status==="Paid"?"green":pa.status==="Sent"?"orange":"slate"}/></div>
                </div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>openPrint(paHTML(sel,pa))} style={{flex:1,padding:"8px",border:"1px solid var(--border)",borderRadius:8,background:"white",cursor:"pointer",fontSize:12,fontWeight:500}}>🖨️ Ver invoice</button>
                {pa.status==="Draft"&&<button onClick={()=>updPA(pa.id,"Sent")} style={{flex:1,padding:"8px",border:"1px solid var(--orange-b)",borderRadius:8,background:"var(--orange-l)",cursor:"pointer",fontSize:12,fontWeight:600,color:"var(--orange-d)"}}>Enviar</button>}
                {pa.status==="Sent"&&<button onClick={()=>updPA(pa.id,"Paid")} style={{flex:1,padding:"8px",border:"1px solid var(--green-b)",borderRadius:8,background:"var(--green-l)",cursor:"pointer",fontSize:12,fontWeight:600,color:"var(--green)"}}>✓ Cobrado</button>}
                {pa.status==="Paid"&&<button onClick={()=>updPA(pa.id,"Sent")} style={{flex:1,padding:"8px",border:"1px solid var(--border)",borderRadius:8,background:"var(--surface)",cursor:"pointer",fontSize:12,fontWeight:500,color:"var(--muted)"}}>Revertir</button>}
              </div>
            </div>
          </Card>)}
          <Card style={{background:"var(--surface)"}}>
            <div style={{padding:"12px 16px"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:13,color:"var(--muted)"}}>Total facturado</span><span style={{fontFamily:M,fontWeight:700,color:"var(--text)"}}>{f$(total)}</span></div>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:13,color:"var(--green)"}}>Cobrado (Paid)</span><span style={{fontFamily:M,fontWeight:700,color:"var(--green)"}}>{f$(cobrado)}</span></div>
              {porCobrar>0&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:13,color:"var(--orange-d)"}}>Por cobrar (Sent)</span><span style={{fontFamily:M,fontWeight:700,color:"var(--orange-d)"}}>{f$(porCobrar)}</span></div>}
              <Divider/>
              <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:13,color:"var(--muted)"}}>Balance sin facturar</span><span style={{fontFamily:M,fontWeight:700,color:"var(--text)"}}>{f$(sel.contractValue-total)}</span></div>
            </div>
          </Card>
        </div>}
      </div>
    </div>;
  }

  return<div style={{paddingBottom:80}}>
    <div style={{padding:"16px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{fontSize:20,fontWeight:800}}>Proyectos</div>
        <Btn size="sm" onClick={()=>setView("new")}>+ Nuevo</Btn>
      </div>
      {projects.map(p=>{
        const cobrado=p.payApps.filter(pa=>pa.status==="Paid").reduce((s,pa)=>s+pa.amount,0);
        const pending=p.payApps.filter(pa=>pa.status==="Sent").reduce((s,pa)=>s+pa.amount,0);
        return<Card key={p.id} style={{marginBottom:12,cursor:"pointer"}} onClick={()=>{setSelId(p.id);setView("detail");}}>
          <div style={{padding:"16px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div>
                <div style={{fontSize:17,fontWeight:700,marginBottom:2}}>{p.name}</div>
                <div style={{fontSize:12,color:"var(--muted)"}}>{p.client||"Sin cliente"} · {f$(p.contractValue)}</div>
              </div>
              <Pill label={p.status==="active"?"Activo":"Cerrado"} color={p.status==="active"?"green":"slate"}/>
            </div>
            <ProgressBar value={cobrado} max={p.contractValue}/>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:8}}>
              <span style={{fontSize:12,color:"var(--green)",fontWeight:600}}>Cobrado: {f$(cobrado)}</span>
              {pending>0&&<span style={{fontSize:12,color:"var(--orange-d)",fontWeight:600}}>P/cobrar: {f$(pending)}</span>}
              <span style={{fontSize:12,color:"var(--muted)"}}>{pct(cobrado,p.contractValue)}%</span>
            </div>
          </div>
        </Card>;
      })}
    </div>
  </div>;
}

function Compras({projects,purchases,setPurchases,expenses,setExpenses,role,toast}){

  const[form,setForm]=useState({projectId:projects[0]?.id||"",date:TODAY,description:"",category:"Materiales",amount:"",notes:""});

  const saveE=()=>{if(!eForm.description||!eForm.amount)return;setExpenses(p=>[...p,{id:Date.now(),date:eForm.date,description:eForm.description,category:eForm.category,amount:+eForm.amount}]);setEForm({date:TODAY,description:"",category:"Gasolina",amount:""});setAdding(false);toast("Gasto guardado");};

      {adding&&<Card style={{marginBottom:12}}>
        <div style={{padding:16,background:"var(--orange-l)"}}>
          <Select label="Proyecto" value={form.projectId} onChange={e=>setForm({...form,projectId:e.target.value})}>{projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</Select>

          </div>
          <Btn onClick={saveP} full>Guardar compra</Btn>

      {purchases.length===0?<Empty icon="🛒" msg="Sin compras" sub="Agrega la primera compra"/>:
      <div style={{display:"grid",gap:10}}>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Input label="Monto ($)" type="number" value={eForm.amount} onChange={e=>setEForm({...eForm,amount:e.target.value})}/>
            <Input label="Fecha" type="date" value={eForm.date} onChange={e=>setEForm({...eForm,date:e.target.value})}/>

          <Btn onClick={saveE} full>Guardar gasto</Btn>

      {expenses.length===0?<Empty icon="💼" msg="Sin gastos generales"/>:

          <div style={{padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>

              <Pill label={ex.category} color="blue"/>

            <div style={{textAlign:"right"}}>
              <div style={{fontSize:18,fontWeight:700,fontFamily:M,color:"var(--blue)"}}>{f$(ex.amount)}</div>

        </Card>)}
      </div>}
    </div>}
  </div>;
}

    {subTab==="lista"&&<div style={{padding:"0 16px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:15,fontWeight:700}}>{workers.length} trabajadores</div>
        <Btn size="sm" onClick={()=>setAdding(!adding)}>+ Agregar</Btn>
      </div>
      {adding&&<Card style={{marginBottom:12}}>
        <div style={{padding:16,background:"var(--green-l)"}}>
          <Input label="Nombre completo" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Nombre del trabajador"/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Select label="Cargo" value={form.role} onChange={e=>setForm({...form,role:e.target.value})}><option>Ayudante</option><option>Carpintero</option><option>Cabillero</option><option>Foreman</option><option>General</option></Select>
            <Select label="Tipo pago" value={form.payType} onChange={e=>setForm({...form,payType:e.target.value,rate:""})}><option value="hourly">Por hora</option><option value="salary">Salario semanal</option></Select>
          </div>
          <Input label={form.payType==="hourly"?"Tarifa ($/hr)":"Salario semanal ($)"} type="number" value={form.rate} onChange={e=>setForm({...form,rate:e.target.value})}/>
          <Btn onClick={addWorker} full>Agregar a la lista</Btn>
        </div>
      </Card>}
      {workers.map(w=><Card key={w.id} style={{marginBottom:10}}>
        <div style={{padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}>
          <Avatar name={w.name} size={44}/>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:15}}>{w.name}</div>
            <div style={{fontSize:12,color:"var(--muted)",marginBottom:6}}>{w.role}</div>
            <Pill label={w.payType==="salary"?f$(w.weeklyRate)+"/sem":"$"+w.hourlyRate+"/hr"} color={w.payType==="salary"?"purple":"blue"}/>
          </div>
          <button onClick={()=>{if(confirm("¿Eliminar a "+w.name+"?"))setWorkers(p=>p.filter(x=>x.id!==w.id));}} style={{background:"none",border:"none",color:"var(--red)",fontSize:20,cursor:"pointer",padding:4}}>×</button>
        </div>
      </Card>)}
    </div>}
    {subTab==="pendientes"&&<div style={{padding:"0 16px"}}>
      {pending.length===0?<Empty icon="✅" msg="Sin solicitudes pendientes"/>:
      pending.map(pw=><Card key={pw.id} style={{marginBottom:10}}>
        <div style={{padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}>
          <Avatar name={pw.name} size={44}/>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:15}}>{pw.name}</div>
            <div style={{fontSize:12,color:"var(--muted)",marginBottom:4}}>{pw.role}{pw.notes&&" · "+pw.notes}</div>
            <div style={{fontSize:11,color:"var(--muted)"}}>Solicitado: {pw.date}</div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}>
            <Btn size="sm" onClick={()=>setApproving(pw)}>💰 Aprobar</Btn>
            <Btn size="sm" variant="danger" onClick={()=>setPending(p=>p.filter(x=>x.id!==pw.id))}>Rechazar</Btn>
          </div>
        </div>
      </Card>)}
    </div>}
    {subTab==="pines"&&<div style={{padding:"0 16px"}}>
      <div style={{fontSize:13,color:"var(--muted)",marginBottom:16}}>Cambia los PINs de acceso de cada usuario.</div>
      {pinUsers.map((u,i)=><Card key={u.id} style={{marginBottom:10}}>
        <div style={{padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}>
          <div style={{fontSize:28}}>{u.emoji||"👤"}</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:15}}>{u.name}</div>
            <div style={{fontSize:12,color:"var(--muted)"}}>{u.role==="admin"?"Admin":u.role==="supervisor"?"Supervisor":"Foreman"}</div>
          </div>
          <input type="text" maxLength={4} value={u.pin} onChange={e=>{const v=e.target.value.replace(/\D/g,"").slice(0,4);const updated=[...pinUsers];updated[i]={...u,pin:v};setPinUsers(updated);localStorage.setItem("nw:pins",JSON.stringify(updated));}} style={{width:70,padding:"8px 10px",border:"2px solid var(--orange-b)",borderRadius:10,fontSize:20,fontFamily:M,fontWeight:700,color:"var(--orange)",textAlign:"center",background:"var(--orange-l)"}}/>
        </div>
      </Card>)}
    </div>}
  </div>;
}

/* ─── CONFIG ─── */
function Config({projects,setProjects,toast,onReset}){
  const[adding,setAdding]=useState(false);
  const[editId,setEditId]=useState(null);
  const[form,setForm]=useState({name:"",code:"",client:"",email:"",address:"",contractValue:""});
  const[ep,setEp]=useState({});
  const addProj=()=>{if(!form.name||!form.contractValue)return;setProjects(p=>[...p,{id:Date.now(),name:form.name,code:form.code||form.name.slice(0,2).toUpperCase(),client:form.client,email:form.email,address:form.address,contractValue:+form.contractValue,status:"active",payApps:[],changeOrders:[],reimbSeq:0}]);setForm({name:"",code:"",client:"",email:"",address:"",contractValue:""});setAdding(false);toast("Proyecto creado");};
  const saveEdit=()=>{setProjects(p=>p.map(proj=>proj.id===editId?{...proj,...ep,contractValue:ep.contractValue!==undefined?+ep.contractValue:proj.contractValue}:proj));setEditId(null);setEp({});};
  return<div style={{paddingBottom:80}}>
    <div style={{padding:"16px"}}>
      <div style={{fontSize:20,fontWeight:800,marginBottom:16}}>Configuración</div>
      <div style={{fontSize:15,fontWeight:700,marginBottom:12}}>Proyectos</div>
      {projects.map(p=><Card key={p.id} style={{marginBottom:10}}>
        {editId===p.id?<div style={{padding:16,background:"var(--orange-l)"}}>
          <Input label="Nombre" value={ep.name!==undefined?ep.name:p.name} onChange={e=>setEp({...ep,name:e.target.value})}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Input label="Código" value={ep.code!==undefined?ep.code:p.code} onChange={e=>setEp({...ep,code:e.target.value})}/>
            <Input label="Contrato ($)" type="number" value={ep.contractValue!==undefined?ep.contractValue:p.contractValue} onChange={e=>setEp({...ep,contractValue:e.target.value})}/>
          </div>
          <Input label="Cliente" value={ep.client!==undefined?ep.client:p.client} onChange={e=>setEp({...ep,client:e.target.value})}/>
          <Input label="Email cliente" value={ep.email!==undefined?ep.email:p.email} onChange={e=>setEp({...ep,email:e.target.value})}/>
          <Input label="Dirección" value={ep.address!==undefined?ep.address:p.address} onChange={e=>setEp({...ep,address:e.target.value})}/>
          <div style={{display:"flex",gap:8}}><Btn onClick={saveEdit} full>Guardar</Btn><Btn variant="ghost" onClick={()=>{setEditId(null);setEp({});}}>Cancelar</Btn></div>
        </div>:
        <div style={{padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}>
          <div style={{fontSize:28}}>🏗️</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:15}}>{p.name}</div>
            <div style={{fontSize:12,color:"var(--muted)"}}>{p.client||"Sin cliente"} · {f$(p.contractValue)}</div>
          </div>
          <button onClick={()=>{setEditId(p.id);setEp({});}} style={{background:"none",border:"1px solid var(--border)",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:13,color:"var(--muted)"}}>Editar</button>
        </div>}
      </Card>)}
      {adding?<Card style={{marginBottom:12}}>
        <div style={{padding:16,background:"var(--green-l)"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Input label="Nombre del proyecto" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Ej: Brickell Plaza"/>
            <Input label="Código (para invoices)" value={form.code} onChange={e=>setForm({...form,code:e.target.value})} placeholder="Ej: BP1"/>
          </div>
          <Input label="Cliente" value={form.client} onChange={e=>setForm({...form,client:e.target.value})} placeholder="Nombre del cliente"/>
          <Input label="Email del cliente" type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="cliente@email.com"/>
          <Input label="Valor del contrato ($)" type="number" value={form.contractValue} onChange={e=>setForm({...form,contractValue:e.target.value})} placeholder="0.00"/>
          <div style={{display:"flex",gap:8}}><Btn onClick={addProj} full>Crear proyecto</Btn><Btn variant="ghost" onClick={()=>setAdding(false)}>Cancelar</Btn></div>
        </div>
      </Card>:<Btn variant="secondary" full onClick={()=>setAdding(true)}>+ Agregar proyecto</Btn>}
      <Divider/>
      <div style={{display:"flex",gap:10,marginTop:8}}>
        <Btn variant="ghost" full onClick={()=>{if("Notification"in window)Notification.requestPermission();}}>🔔 Notificaciones</Btn>
        <Btn variant="danger" full onClick={()=>{if(confirm("¿Resetear todos los datos?"))onReset();}}>Resetear</Btn>
      </div>
    </div>
  </div>;
}

/* ─── APP ─── */
function App(){
  const[loaded,setLoaded]=useState(false);
  const[saving,setSaving]=useState(false);
  const[savedOk,setSavedOk]=useState(false);
  const[user,setUser]=useState(null);
  const[tab,setTab]=useState("dashboard");
  const[projects,setProjects]=useState(DEFAULT_PROJECTS);
  const[workers,setWorkers]=useState(DEFAULT_WORKERS);
  const[timeEntries,setTimeEntries]=useState([]);
  const[purchases,setPurchases]=useState([]);
  const[expenses,setExpenses]=useState([]);
  const[pending,setPending]=useState([]);
  const[reimb,setReimb]=useState([]);
  const[pinUsers,setPinUsers]=useState(DEFAULT_PINS);
  const[viewProjectId,setViewProjectId]=useState(null);
  const timer=useRef(null);
  const{toasts,add:toast}=useToasts();

  // LOAD
  useEffect(()=>{
    const load=async()=>{
      const keys=[["projects",setProjects],["workers",setWorkers],["timeEntries",setTimeEntries],["purchases",setPurchases],["expenses",setExpenses],["pending",setPending],["reimb",setReimb]];
      // Try Supabase first, fallback to localStorage
      const oldKeys={"projects":"nw82:p","workers":"nw82:w","timeEntries":"nw82:t","purchases":"nw82:pu","expenses":"nw82:ex","pending":"nw82:pw","reimb":"nw82:rm"};
      await Promise.all(keys.map(async([k,setter])=>{
        const sbVal=await sbGet(k);
        if(sbVal&&Array.isArray(sbVal)&&sbVal.length>0){setter(sbVal);return;}
        // Migrate from old localStorage
        try{const lv=localStorage.getItem(oldKeys[k]);if(lv){const p=JSON.parse(lv);if(Array.isArray(p)&&p.length>0){setter(p);await sbSet(k,p);}}}catch(e){}
      }));
      // Load PINs
      try{const pv=localStorage.getItem("nw:pins");if(pv)setPinUsers(JSON.parse(pv));}catch(e){}
      setLoaded(true);
    };
    load();
    // Realtime
    const ch=sb.channel("nw_sync").on("postgres_changes",{event:"UPDATE",schema:"public",table:"app_data"},(payload)=>{
      const{key,value}=payload.new;
      const map={projects:setProjects,workers:setWorkers,timeEntries:setTimeEntries,purchases:setPurchases,expenses:setExpenses,pending:setPending,reimb:setReimb};
      if(map[key]&&Array.isArray(value))map[key](value);
    }).subscribe();
    return()=>sb.removeChannel(ch);
  },[]);

  // SAVE
  useEffect(()=>{
    if(!loaded)return;
    if(timer.current)clearTimeout(timer.current);
    setSaving(true);setSavedOk(false);
    timer.current=setTimeout(async()=>{
      await Promise.all([sbSet("projects",projects),sbSet("workers",workers),sbSet("timeEntries",timeEntries),sbSet("purchases",purchases),sbSet("expenses",expenses),sbSet("pending",pending),sbSet("reimb",reimb)]);
      setSaving(false);setSavedOk(true);
      setTimeout(()=>setSavedOk(false),2000);
    },800);
  },[projects,workers,timeEntries,purchases,expenses,pending,reimb,loaded]);

  const reset=()=>{setProjects(DEFAULT_PROJECTS);setWorkers(DEFAULT_WORKERS);setTimeEntries([]);setPurchases([]);setExpenses([]);setPending([]);setReimb([]);};

  if(!loaded)return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,background:"var(--orange)"}}>
    <div style={{fontSize:64}}>👷</div>
    <div style={{color:"white",fontSize:22,fontWeight:800}}>N&W Admin</div>
    <div style={{width:40,height:40,borderRadius:"50%",border:"4px solid rgba(255,255,255,0.3)",borderTopColor:"white",animation:"spin 0.8s linear infinite"}}/>
  </div>;

  if(!user)return<LoginScreen pins={pinUsers} onLogin={(u)=>{setUser(u);setTab(u.role==="admin"?"dashboard":u.role==="supervisor"?"clock":"clock");}}/>;

  const role=user.role;
  const pendCount=pending.length;

  // Render current tab
  const renderTab=()=>{
    if(tab==="dashboard")return<Dashboard projects={projects} timeEntries={timeEntries} workers={workers} purchases={purchases} expenses={expenses} reimb={reimb} onViewProject={(id)=>{setViewProjectId(id);setTab("proyectos");}}/>;
    if(tab==="proyectos")return<Proyectos projects={projects} setProjects={setProjects} timeEntries={timeEntries} workers={workers} purchases={purchases} reimb={reimb} toast={toast} initProjectId={viewProjectId}/>;
    if(tab==="clock")return<TimeClock projects={projects} workers={workers} setWorkers={setWorkers} timeEntries={timeEntries} setTimeEntries={setTimeEntries} pending={pending} setPending={setPending} role={role} user={user} toast={toast}/>;
    if(tab==="personal")return<Personal workers={workers} setWorkers={setWorkers} pending={pending} setPending={setPending} timeEntries={timeEntries} toast={toast} pinUsers={pinUsers} setPinUsers={setPinUsers}/>;
    if(tab==="compras")return<Compras projects={projects} purchases={purchases} setPurchases={setPurchases} expenses={expenses} setExpenses={setExpenses} role={role} toast={toast}/>;
    if(tab==="config")return<Config projects={projects} setProjects={setProjects} toast={toast} onReset={reset}/>;
    if(tab==="finanzas")return<Dashboard projects={projects} timeEntries={timeEntries} workers={workers} purchases={purchases} expenses={expenses} reimb={reimb} onViewProject={(id)=>{setViewProjectId(id);setTab("proyectos");}}/>;
    return null;
  };

  return<div style={{minHeight:"100vh",background:"var(--surface)"}}>
    <Toasts toasts={toasts}/>
    {/* TOP BAR */}
    <div style={{position:"sticky",top:0,zIndex:100,background:"white",borderBottom:"1px solid var(--border)",padding:"0 16px",height:56,display:"flex",alignItems:"center",gap:12}}>
      <div style={{fontSize:24}}>👷</div>
      <div style={{fontWeight:800,fontSize:17,color:"var(--orange)"}}>N&W</div>
      <div style={{flex:1}}/>
      <div style={{fontSize:12,color:"var(--muted)",display:"flex",alignItems:"center",gap:4}}>
        <span style={{width:7,height:7,borderRadius:"50%",background:saving?"var(--orange)":savedOk?"var(--green)":"var(--border)",display:"inline-block",animation:saving?"pulse 0.7s infinite":"none"}}/>
        {saving?"Guardando...":savedOk?"Guardado ✓":""}
      </div>
      <div style={{background:"var(--orange-l)",color:"var(--orange-d)",padding:"5px 10px",borderRadius:8,fontSize:12,fontWeight:600}}>{user.emoji} {user.name}</div>
      <button onClick={()=>setUser(null)} style={{background:"none",border:"1px solid var(--border)",borderRadius:8,padding:"5px 10px",cursor:"pointer",fontSize:12,color:"var(--muted)"}}>Salir</button>
    </div>
    {/* CONTENT */}
    <div className="fade" key={tab}>{renderTab()}</div>
    {/* BOTTOM NAV */}
    <BottomNav tab={tab} setTab={setTab} role={role} pendingCount={pendCount}/>
  </div>;
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
