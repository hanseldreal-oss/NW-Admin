/* ─── NOTIFICATIONS ─── */
function useNotifications(timeEntries){
  const ref=useRef({});const[toasts,setToasts]=useState([]);
  const addToast=useCallback((msg,type="warn")=>{const id=Date.now();setToasts(t=>[...t,{id,msg,type}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),7000);},[]);
  useEffect(()=>{if("Notification"in window&&Notification.permission==="default")Notification.requestPermission();},[]);
  const fire=(title,body)=>{addToast(title+" — "+body,"warn");if("Notification"in window&&Notification.permission==="granted")try{new Notification(title,{body});}catch(e){}};
  useEffect(()=>{
    const check=()=>{const now=new Date();const day=now.getDay();if(day===0)return;const sat=day===6;const h=now.getHours();const m=now.getMinutes();const k=now.toDateString();if(!ref.current[k])ref.current[k]={};const s=ref.current[k];const tod=now.toISOString().split("T")[0];const open=timeEntries.some(e=>e.date===tod&&(!e.clockOut||e.clockOut===""));const any=timeEntries.some(e=>e.date===tod);
      if(h===8&&m>=30&&m<35&&!s.a){s.a=1;fire("⏰ N&W — Recordatorio","No se olvide de hacer el listado de la nómina.");}
      if(!sat){if(h===17&&m<5&&!s.b){s.b=1;fire("⏰ N&W — Cierre de nómina","Registra la salida del personal.");}if(h===19&&m<5&&!s.c&&(open||!any)){s.c=1;fire("⚠️ N&W — Nómina pendiente","La nómina de hoy no ha sido cerrada.");}}
      else{if(h===13&&m<5&&!s.d){s.d=1;fire("⏰ N&W — Cierre (Sáb)","Hora de cerrar la nómina del sábado.");}if(h===15&&m<5&&!s.e&&(open||!any)){s.e=1;fire("⚠️ N&W — Nómina pendiente (Sáb)","La nómina del sábado no ha sido cerrada.");}}
    };
    const iv=setInterval(check,30000);check();return()=>clearInterval(iv);
  },[timeEntries]);
  return{toasts,addToast};
}
function Toasts({toasts}){if(!toasts.length)return null;return<div style={{position:"fixed",top:16,right:16,zIndex:9999,display:"flex",flexDirection:"column",gap:8,maxWidth:360}}>{toasts.map(t=><div key={t.id} className="toast" style={{background:t.type==="succ"?"var(--succ-bg)":t.type==="info"?"var(--info-bg)":"var(--warn-bg)",border:"1px solid "+(t.type==="succ"?"var(--succ-bdr)":t.type==="info"?"var(--info-bdr)":"var(--warn-bdr)"),borderRadius:"var(--r)",padding:"12px 16px",fontSize:13,color:t.type==="succ"?"var(--succ)":t.type==="info"?"var(--info)":"var(--warn)",boxShadow:"0 4px 16px rgba(0,0,0,0.12)",fontWeight:500}}>{t.msg}</div>)}</div>;}

function PayApps({projects,setProjects,role}){
  const[pid,setPid]=useState(projects[0]?.id);
  const[view,setView]=useState("pa");
  // FIX 2: filter by type
  const[paFilter,setPaFilter]=useState("all"); // all | labor | reimb | co
  const[paF,setPaF]=useState({description:"",amount:"",date:TODAY,status:"Draft"});
  const[addPA,setAddPA]=useState(false);
  const[coF,setCoF]=useState({description:"",amount:"",date:TODAY,status:"Draft",inContract:false});
  const[addCO,setAddCO]=useState(false);
  const[search,setSearch]=useState("");
  const isMaster=role==="master";
  const proj=projects.find(p=>p.id===pid)||projects[0];
  if(!proj)return<Empty msg="Sin proyectos."/>;
  const incCOs=proj.changeOrders.filter(c=>c.status==="Approved"&&c.inContract).reduce((s,c)=>s+c.amount,0);
  const revC=proj.contractValue+incCOs;
  const totalPA=proj.payApps.reduce((s,pa)=>s+pa.amount,0);
  const paidPA=proj.payApps.filter(pa=>pa.status==="Paid").reduce((s,pa)=>s+pa.amount,0);
  const sentPA=proj.payApps.filter(pa=>pa.status==="Sent").reduce((s,pa)=>s+pa.amount,0);
  const appCO=proj.changeOrders.filter(c=>c.status==="Approved").reduce((s,c)=>s+c.amount,0);

  // FIX 2: subtotals per type
  const laborPAs=proj.payApps.filter(pa=>!pa.isReimb);
  const reimbPAs=proj.payApps.filter(pa=>pa.isReimb);
  const laborTotal=laborPAs.reduce((s,pa)=>s+pa.amount,0);
  const reimbTotal=reimbPAs.reduce((s,pa)=>s+pa.amount,0);
  const coTotal=proj.changeOrders.reduce((s,co)=>s+co.amount,0);

  const doAddPA=()=>{if(!paF.description||!paF.amount)return;const invNum=nextPANum(proj);setProjects(projects.map(p=>p.id!==proj.id?p:{...p,payApps:[...p.payApps,{id:Date.now(),number:"PA-"+String(p.payApps.length+1).padStart(3,"0"),invNum,description:paF.description,amount:+paF.amount,date:paF.date,status:paF.status,isReimb:false}]}));setPaF({description:"",amount:"",date:TODAY,status:"Draft"});setAddPA(false);};
  const doAddCO=()=>{if(!coF.description||!coF.amount)return;setProjects(projects.map(p=>p.id!==proj.id?p:{...p,changeOrders:[...p.changeOrders,{id:Date.now(),number:"CO-"+String(p.changeOrders.length+1).padStart(3,"0"),description:coF.description,amount:+coF.amount,date:coF.date,status:coF.status,inContract:coF.inContract}]}));setCoF({description:"",amount:"",date:TODAY,status:"Draft",inContract:false});setAddCO(false);};
  const updPA=(id,st)=>setProjects(projects.map(p=>p.id!==proj.id?p:{...p,payApps:p.payApps.map(pa=>pa.id===id?{...pa,status:st}:pa)}));
  const updCO=(id,ch)=>setProjects(projects.map(p=>p.id!==proj.id?p:{...p,changeOrders:p.changeOrders.map(c=>c.id===id?{...c,...ch}:c)}));
  // FIX 1: only master can delete
  const delPA=id=>{if(!isMaster)return;if(confirm("¿Eliminar esta PA?"))setProjects(projects.map(p=>p.id!==proj.id?p:{...p,payApps:p.payApps.filter(pa=>pa.id!==id)}));};

  // FIX 2: filter PAs by type + search
  let filtPAs=proj.payApps;
  if(paFilter==="labor")filtPAs=filtPAs.filter(pa=>!pa.isReimb);
  else if(paFilter==="reimb")filtPAs=filtPAs.filter(pa=>pa.isReimb);
  if(search)filtPAs=filtPAs.filter(pa=>(pa.invNum||"").toLowerCase().includes(search.toLowerCase())||(pa.description||"").toLowerCase().includes(search.toLowerCase())||(pa.number||"").toLowerCase().includes(search.toLowerCase()));

  return(
    <div style={{display:"flex",gap:18}}>
      <div style={{width:215,flexShrink:0}}>
        <div style={{fontSize:10,color:"var(--muted)",marginBottom:9,fontFamily:M,letterSpacing:"0.07em",textTransform:"uppercase"}}>Proyectos</div>
        {projects.map(p=>{const b=p.payApps.reduce((s,pa)=>s+pa.amount,0);const rv=p.contractValue;const sel=p.id===proj.id;
          return<div key={p.id} onClick={()=>{setPid(p.id);setView("pa");setPaFilter("all");}} style={{padding:"11px 13px",borderRadius:"var(--r)",marginBottom:7,cursor:"pointer",border:sel?"1.5px solid var(--warn-bdr)":"0.5px solid var(--bdr)",background:sel?"var(--warn-bg)":"var(--bg)"}}>
            <div style={{fontSize:13,fontWeight:600,color:sel?"var(--warn)":"var(--text)",marginBottom:3}}>{p.name}</div>
            <div style={{fontSize:11,color:"var(--muted)",marginBottom:5,fontFamily:M}}>{f$(b)} / {f$(rv)}</div>
            <Bar value={b} max={rv}/>
          </div>;})}
        <div style={{marginTop:18,paddingTop:14,borderTop:"0.5px solid var(--bdr)"}}>
          <div style={{fontSize:10,color:"var(--muted)",marginBottom:9,fontFamily:M,letterSpacing:"0.07em",textTransform:"uppercase"}}>Totales globales</div>
          {[["Contratos",projects.reduce((s,p)=>s+p.contractValue,0),"var(--text)"],["Facturado",projects.reduce((s,p)=>s+p.payApps.reduce((ss,pa)=>ss+pa.amount,0),0),"var(--warn)"],["Cobrado",projects.reduce((s,p)=>s+p.payApps.filter(pa=>pa.status==="Paid").reduce((ss,pa)=>ss+pa.amount,0),0),"var(--succ)"],["Por cobrar",projects.reduce((s,p)=>s+p.payApps.filter(pa=>pa.status==="Sent").reduce((ss,pa)=>ss+pa.amount,0),0),"var(--orng)"]].map(([l,v,c])=><div key={l} style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:6}}><span style={{color:"var(--muted)"}}>{l}</span><span style={{color:c,fontFamily:M,fontWeight:600}}>{f$(v)}</span></div>)}

              <div style={{paddingBottom:10}}><Btn v="amber" onClick={doAddPA}>Agregar</Btn></div>
            </div>
          </div>}
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr>{["#","Invoice #","Fecha","Descripción","Tipo","Monto","Status",""].map(h=><th key={h} style={TH}>{h}</th>)}</tr></thead>
            <tbody>
              {filtPAs.length===0?<tr><td colSpan={8}><Empty msg={search?"Sin resultados.":"Sin pay applications."}/></td></tr>
              :filtPAs.map(pa=><tr key={pa.id} onMouseOver={e=>e.currentTarget.style.background="var(--surf)"} onMouseOut={e=>e.currentTarget.style.background=""}>
                <td style={{...TD,fontFamily:M,color:"var(--warn)",fontSize:12,fontWeight:600}}>{pa.number}</td>
                <td style={{...TD,fontFamily:M,fontSize:11,fontWeight:600,color:pa.isReimb?"var(--teal)":"var(--info)"}}>{pa.invNum||"—"}</td>
                <td style={{...TD,fontFamily:M,fontSize:11,color:"var(--muted)"}}>{pa.date}</td>
                <td style={{...TD,fontSize:12}}>{pa.description}</td>
                <td style={TD}>{pa.isReimb?<Badge status="Reimb" label="Reembolsable"/>:<Badge status="Enviado" label="Labor PA"/>}</td>
                <td style={{...TD,fontFamily:M,fontWeight:700,fontSize:14}}>{f$(pa.amount)}</td>
                <td style={TD}><Badge status={pa.status} label={pa.status==="Paid"?"Cobrado":pa.status==="Sent"?"Por cobrar":pa.status}/></td>
                <td style={TD}><div style={{display:"flex",gap:4}}>
                  <Btn sm v="info" onClick={()=>openPrint(paInvoiceHTML(proj,pa))} title="Ver / Imprimir">🖨️</Btn>
                  {pa.status==="Draft"&&isMaster&&<Btn sm v="amber" onClick={()=>updPA(pa.id,"Sent")}>Enviar</Btn>}
                  {pa.status==="Sent"&&isMaster&&<Btn sm v="succ" onClick={()=>updPA(pa.id,"Paid")}>✓ Cobrado</Btn>}
                  {pa.status==="Paid"&&isMaster&&<Btn sm v="orng" onClick={()=>updPA(pa.id,"Sent")}>Revertir</Btn>}
                  {isMaster&&<Btn sm v="dngr" onClick={()=>delPA(pa.id)} style={{padding:"3px 7px"}}>×</Btn>}
                </div></td>
              </tr>)}
            </tbody>
            {proj.payApps.length>0&&<tfoot>
              <tr style={{background:"var(--surf)"}}><td colSpan={5} style={{...TDF,textAlign:"right",fontFamily:M,fontSize:11,color:"var(--muted)",fontWeight:600}}>Total facturado</td><td style={{...TDF,fontFamily:M,fontWeight:700,color:"var(--warn)",fontSize:15}}>{f$(totalPA)}</td><td colSpan={2} style={TDF}/></tr>
              <tr style={{background:"var(--succ-bg)"}}><td colSpan={5} style={{...TDF,textAlign:"right",fontFamily:M,fontSize:11,color:"var(--succ)",fontWeight:600}}>Cobrado (Paid)</td><td style={{...TDF,fontFamily:M,fontWeight:700,color:"var(--succ)",fontSize:15}}>{f$(paidPA)}</td><td colSpan={2} style={TDF}/></tr>
              {sentPA>0&&<tr style={{background:"var(--orng-bg)"}}><td colSpan={5} style={{...TDF,textAlign:"right",fontFamily:M,fontSize:11,color:"var(--orng)",fontWeight:600}}>Por cobrar (Sent)</td><td style={{...TDF,fontFamily:M,fontWeight:700,color:"var(--orng)",fontSize:15}}>{f$(sentPA)}</td><td colSpan={2} style={TDF}/></tr>}
              <tr style={{background:"var(--warn-bg)"}}><td colSpan={5} style={{...TDF,textAlign:"right",fontFamily:M,fontSize:11,color:"var(--warn)",fontWeight:600}}>Balance sin facturar</td><td style={{...TDF,fontFamily:M,fontWeight:700,color:"var(--warn)",fontSize:15}}>{f$(revC-totalPA)}</td><td colSpan={2} style={TDF}/></tr>
            </tfoot>}
          </table>

          {/* FIX 2: subtotals by category */}
          {proj.payApps.length>0&&<div style={{padding:"12px 15px",borderTop:"0.5px solid var(--bdr)",background:"var(--surf)",display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
            {[["Labor / Pay Apps",laborTotal,"var(--info)"],["Reembolsables",reimbTotal,"var(--teal)"],["Change Orders",coTotal,"var(--purp)"]].map(([l,v,c])=><div key={l} style={{textAlign:"center"}}><div style={{fontSize:10,color:"var(--muted)",fontFamily:M,marginBottom:3}}>{l}</div><div style={{fontSize:16,fontWeight:700,fontFamily:M,color:c}}>{f$(v)}</div></div>)}
          </div>}
        </Card>}

        {view==="co"&&<Card>
          <SHead title={"Change orders — "+proj.name} action={isMaster&&<Btn v="info" sm onClick={()=>setAddCO(!addCO)}>+ Nuevo CO</Btn>}/>
          {addCO&&isMaster&&<div style={{padding:"13px 15px",background:"#eff8ff",borderBottom:"1px solid var(--info-bdr)"}}>
            <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr auto",gap:8,alignItems:"end"}}>
              <Fld label="Descripción" value={coF.description} onChange={e=>setCoF({...coF,description:e.target.value})} placeholder="Obra adicional..."/>
              <Fld label="Monto ($)" type="number" value={coF.amount} onChange={e=>setCoF({...coF,amount:e.target.value})}/>
              <Fld label="Fecha" type="date" value={coF.date} onChange={e=>setCoF({...coF,date:e.target.value})}/>
              <Slct label="Status" value={coF.status} onChange={e=>setCoF({...coF,status:e.target.value})}><option>Draft</option><option>Submitted</option><option>Approved</option><option>Rejected</option></Slct>
              <div style={{paddingBottom:10}}><Btn v="info" onClick={doAddCO}>Agregar</Btn></div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:9,marginTop:5}}><Toggle on={coF.inContract} onClick={()=>setCoF({...coF,inContract:!coF.inContract})}/><span style={{fontSize:12,color:"var(--muted)"}}>Incluir en contrato revisado</span></div>
          </div>}
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr>{["#","Fecha","Descripción","Monto","Status","Al contrato","Acciones"].map(h=><th key={h} style={TH}>{h}</th>)}</tr></thead>
            <tbody>
              {proj.changeOrders.length===0?<tr><td colSpan={7}><Empty msg="Sin change orders."/></td></tr>
              :proj.changeOrders.map(co=><tr key={co.id} onMouseOver={e=>e.currentTarget.style.background="var(--surf)"} onMouseOut={e=>e.currentTarget.style.background=""}>
                <td style={{...TD,fontFamily:M,color:"var(--info)",fontSize:12,fontWeight:600}}>{co.number}</td>
                <td style={{...TD,fontFamily:M,fontSize:11,color:"var(--muted)"}}>{co.date}</td>
                <td style={TD}>{co.description}</td>
                <td style={{...TD,fontFamily:M,fontWeight:600}}>{f$(co.amount)}</td>
                <td style={TD}><Badge status={co.status}/></td>
                <td style={TD}><div style={{display:"flex",alignItems:"center",gap:7}}><Toggle on={co.inContract} onClick={()=>isMaster&&updCO(co.id,{inContract:!co.inContract})}/><span style={{fontSize:10,color:co.inContract&&co.status==="Approved"?"var(--info)":"var(--muted)",fontFamily:M}}>{co.inContract&&co.status==="Approved"?"+ contrato":"sep."}</span></div></td>
                <td style={TD}><div style={{display:"flex",gap:5}}>
                  {co.status==="Draft"&&isMaster&&<Btn sm v="def" onClick={()=>updCO(co.id,{status:"Submitted"})}>Enviar</Btn>}
                  {co.status==="Submitted"&&isMaster&&<><Btn sm v="succ" onClick={()=>updCO(co.id,{status:"Approved"})}>✓</Btn><Btn sm v="dngr" onClick={()=>updCO(co.id,{status:"Rejected"})}>✗</Btn></>}
                </div></td>
              </tr>)}
            </tbody>
            {proj.changeOrders.length>0&&<tfoot><tr style={{background:"var(--surf)"}}><td colSpan={3} style={{...TDF,textAlign:"right",fontFamily:M,fontSize:11,color:"var(--muted)",fontWeight:600}}>Total Change Orders</td><td style={{...TDF,fontFamily:M,fontWeight:700,color:"var(--purp)",fontSize:15}}>{f$(coTotal)}</td><td colSpan={3} style={TDF}/></tr></tfoot>}
          </table>
        </Card>}
      </div>
    </div>
  );
}

/* ═══ REIMBURSABLES ═══ */
const RCATS=["Materiales","Herramientas","Equipos rentados","Permisos / Fees","Transporte","Misceláneos"];
function Reimbursables({projects,setProjects,reimb,setReimb,role}){
  const[pid,setPid]=useState(projects[0]?.id);
  const[selWeek,setSelWeek]=useState(getWeekStart(TODAY));
  const[form,setForm]=useState({date:TODAY,description:"",category:"Materiales",amount:"",notes:""});
  const[img,setImg]=useState(null);const[imgPrev,setImgPrev]=useState(null);
  const[adding,setAdding]=useState(false);const[viewImg,setViewImg]=useState(null);
  // FIX 1: invoice search
  const[invSearch,setInvSearch]=useState("");
  const[invView,setInvView]=useState("week"); // week | all
  const fRef=useRef();
  const isMaster=role==="master";
  const proj=projects.find(p=>p.id===pid)||projects[0];
  if(!proj)return<Empty msg="Sin proyectos."/>;
  const pItems=reimb.filter(r=>r.projectId===proj.id);
  const byWeek=useMemo(()=>{const m={};pItems.forEach(r=>{const ws=getWeekStart(r.date);if(!m[ws])m[ws]=[];m[ws].push(r);});return Object.entries(m).sort((a,b)=>b[0].localeCompare(a[0]));},[pItems]);
  const wItems=pItems.filter(r=>getWeekStart(r.date)===selWeek);
  const wTotal=wItems.reduce((s,r)=>s+r.amount,0);
  const uninv=wItems.filter(r=>!r.invoiced);
  const pTotal=pItems.reduce((s,r)=>s+r.amount,0);
  const pInv=pItems.filter(r=>r.invoiced).reduce((s,r)=>s+r.amount,0);

  // FIX 1: all invoices list (for search/reprint)
  const allInvoices=useMemo(()=>{
    const invMap={};
    pItems.filter(r=>r.invoiced&&r.invoiceNum).forEach(r=>{
      if(!invMap[r.invoiceNum])invMap[r.invoiceNum]={invNum:r.invoiceNum,items:[],weekStart:"",weekEnd:""};
      invMap[r.invoiceNum].items.push(r);
    });
    return Object.values(invMap).map(inv=>{
      const dates=inv.items.map(i=>i.date).sort();
      inv.weekStart=getWeekStart(dates[0]);
      inv.weekEnd=addDays(inv.weekStart,5);
      inv.total=inv.items.reduce((s,i)=>s+i.amount,0);
      return inv;
    }).sort((a,b)=>b.invNum.localeCompare(a.invNum));
  },[pItems]);

  const filtInvoices=invSearch?allInvoices.filter(inv=>inv.invNum.toLowerCase().includes(invSearch.toLowerCase())):allInvoices;

  const handleFile=e=>{const f=e.target.files[0];if(!f)return;if(f.size>5*1024*1024){alert("Imagen muy grande.");return;}const rd=new FileReader();rd.onload=ev=>{setImg(ev.target.result);setImgPrev(ev.target.result);};rd.readAsDataURL(f);};
  const save=()=>{if(!form.description||!form.amount)return;setReimb([...reimb,{id:Date.now(),projectId:proj.id,date:form.date,description:form.description,category:form.category,amount:+form.amount,notes:form.notes,receipt:img,invoiced:false,invoiceNum:""}]);setForm({date:TODAY,description:"",category:"Materiales",amount:"",notes:""});setImg(null);setImgPrev(null);if(fRef.current)fRef.current.value="";setAdding(false);};

  const genInvoice=()=>{
    if(!uninv.length){alert("Todos los gastos de esta semana ya fueron facturados.");return;}
    if(!proj.client){alert("Agrega el nombre del cliente en Configuración → Proyectos → Editar.");return;}
    const weekEnd=addDays(selWeek,5);
    const seq=(proj.reimbSeq||0)+1;
    const invNum=nextReimbNum(proj);
    const totalAmt=uninv.reduce((s,r)=>s+r.amount,0);
    setReimb(reimb.map(r=>uninv.some(u=>u.id===r.id)?{...r,invoiced:true,invoiceNum:invNum}:r));
    setProjects(projects.map(p=>{
      if(p.id!==proj.id)return p;
      const newPA={id:Date.now(),number:"PA-"+String(p.payApps.length+1).padStart(3,"0"),invNum,description:"Reimbursable Materials — "+selWeek+" al "+weekEnd,amount:totalAmt,date:weekEnd,status:"Sent",isReimb:true};
      return{...p,reimbSeq:seq,payApps:[...p.payApps,newPA]};
    }));
    openPrint(reimbInvoiceHTML(proj,uninv,selWeek,weekEnd,invNum));
  };

  // FIX 1: reprint existing invoice
  const reprintInvoice=(inv)=>{
    openPrint(reimbInvoiceHTML(proj,inv.items,inv.weekStart,inv.weekEnd,inv.invNum));
  };

  return(
    <div style={{display:"flex",gap:18}}>
      <div style={{width:220,flexShrink:0}}>
        <div style={{fontSize:10,color:"var(--muted)",marginBottom:9,fontFamily:M,letterSpacing:"0.07em",textTransform:"uppercase"}}>Proyectos</div>
        {projects.map(p=>{const tot=reimb.filter(r=>r.projectId===p.id).reduce((s,r)=>s+r.amount,0);const pend=reimb.filter(r=>r.projectId===p.id&&!r.invoiced).reduce((s,r)=>s+r.amount,0);const sel=p.id===proj.id;
          return<div key={p.id} onClick={()=>setPid(p.id)} style={{padding:"11px 13px",borderRadius:"var(--r)",marginBottom:7,cursor:"pointer",border:sel?"1.5px solid var(--orng-bdr)":"0.5px solid var(--bdr)",background:sel?"var(--orng-bg)":"var(--bg)"}}>
            <div style={{fontSize:13,fontWeight:600,color:sel?"var(--orng)":"var(--text)",marginBottom:4}}>{p.name}</div>
            <div style={{fontSize:11,fontFamily:M,marginBottom:2}}>Total: <strong style={{color:"var(--orng)"}}>{f$(tot)}</strong></div>
            {pend>0&&<div style={{fontSize:10,color:"var(--warn)",fontFamily:M}}>Sin facturar: {f$(pend)}</div>}
          </div>;})}
        {byWeek.length>0&&<div style={{marginTop:16,paddingTop:14,borderTop:"0.5px solid var(--bdr)"}}>
          <div style={{fontSize:10,color:"var(--muted)",marginBottom:9,fontFamily:M,letterSpacing:"0.07em",textTransform:"uppercase"}}>Semanas</div>
          {byWeek.map(([ws,items])=>{const tot=items.reduce((s,i)=>s+i.amount,0);const inv=items.every(i=>i.invoiced);const sel=ws===selWeek&&invView==="week";
            return<div key={ws} onClick={()=>{setSelWeek(ws);setInvView("week");}} style={{padding:"9px 12px",borderRadius:"var(--r)",marginBottom:6,cursor:"pointer",border:sel?"1.5px solid var(--orng-bdr)":"0.5px solid var(--bdr)",background:sel?"var(--orng-bg)":"var(--bg)"}}>
              <div style={{fontSize:11,fontFamily:M,color:sel?"var(--orng)":"var(--muted)",marginBottom:3}}>{ws}</div>
              <div style={{fontSize:13,fontFamily:M,fontWeight:700,color:"var(--orng)"}}>{f$(tot)}</div>
              <div style={{marginTop:4}}>{inv?<Badge status="Invoiced" label="Facturado ✓"/>:<Badge status="PendInv" label="Sin facturar"/>}</div>
            </div>;})}
        </div>}
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,minmax(0,1fr))",gap:10,marginBottom:14}}>
          <Kpi label={"Total — "+proj.name} value={f$(pTotal)} color="var(--orng)"/>
          <Kpi label="Facturado" value={f$(pInv)} color="var(--succ)" sub={pInv>0?pct(pInv,pTotal)+"% del total":undefined}/>
          <Kpi label="Pendiente de facturar" value={f$(pTotal-pInv)} color="var(--warn)"/>
        </div>
        {!proj.client&&<div style={{background:"var(--warn-bg)",border:"1px solid var(--warn-bdr)",borderRadius:"var(--r)",padding:"10px 14px",marginBottom:14,fontSize:12,color:"var(--warn)"}}>⚠️ Para generar invoices agrega los datos del cliente en Configuración → Proyectos → Editar</div>}

        {/* Sub-tabs: week view vs invoice history */}
        <div style={{display:"flex",border:"0.5px solid var(--bdrMd)",borderRadius:"var(--r)",overflow:"hidden",width:"fit-content",marginBottom:14}}>
          {[["week","Gastos por semana"],["invoices","Historial de invoices"]].map(([v,l],i)=>(
            <div key={v} onClick={()=>setInvView(v)} style={{padding:"7px 14px",cursor:"pointer",fontSize:12,fontFamily:M,background:invView===v?"var(--orng-bg)":"transparent",color:invView===v?"var(--orng)":"var(--muted)",fontWeight:invView===v?600:400,borderRight:i===0?"0.5px solid var(--bdrMd)":"none",display:"flex",alignItems:"center",gap:6}}>
              {l}{v==="invoices"&&allInvoices.length>0&&<span style={{background:"var(--succ-bg)",color:"var(--succ)",borderRadius:10,padding:"1px 7px",fontSize:10,fontWeight:600}}>{allInvoices.length}</span>}
            </div>))}
        </div>

        {/* WEEK VIEW */}
        {invView==="week"&&<>
          <div style={{display:"flex",gap:10,alignItems:"flex-end",marginBottom:14,flexWrap:"wrap"}}>
            <div><div style={{fontSize:11,color:"var(--muted)",fontFamily:M,marginBottom:4}}>Ver semana</div><input type="date" value={selWeek} onChange={e=>setSelWeek(getWeekStart(e.target.value))} style={{background:"var(--surf)",border:"0.5px solid var(--bdrMd)",color:"var(--text)",padding:"7px 10px",borderRadius:"var(--r)",fontSize:13,fontFamily:M,outline:"none"}}/></div>
            <div style={{fontSize:12,color:"var(--muted)",fontFamily:M,alignSelf:"center",marginTop:18}}>{selWeek} — {addDays(selWeek,5)}</div>
            <div style={{flex:1}}/>
            <Btn v="orng" sm onClick={()=>setAdding(!adding)}>+ Agregar gasto</Btn>
            {uninv.length>0&&<Btn v="amber" onClick={genInvoice}>🧾 Generar Invoice — {f$(uninv.reduce((s,r)=>s+r.amount,0))}</Btn>}
          </div>
          {adding&&<Card style={{marginBottom:14}}>
            <SHead title={"Agregar gasto reembolsable — "+proj.name}/>
            <div style={{padding:"14px 15px",background:"var(--orng-bg)"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:8}}>
                <Fld label="Fecha" type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/>
                <Slct label="Categoría" value={form.category} onChange={e=>setForm({...form,category:e.target.value})}>{RCATS.map(c=><option key={c}>{c}</option>)}</Slct>
                <Fld label="Monto ($)" type="number" value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})} placeholder="0.00"/>
              </div>
              <Fld label="Descripción" value={form.description} onChange={e=>setForm({...form,description:e.target.value})} placeholder="Ej: Bloques concreto — Home Depot, 200 uds"/>
              <Fld label="Proveedor / notas" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="Proveedor, # recibo..."/>
              <div style={{marginBottom:12}}><div style={{fontSize:11,color:"var(--muted)",marginBottom:5,fontFamily:M}}>Foto del recibo</div><div style={{display:"flex",gap:10,alignItems:"center"}}><input ref={fRef} type="file" accept="image/*" capture="environment" onChange={handleFile} style={{fontSize:12,color:"var(--text)"}}/>{imgPrev&&<div style={{position:"relative"}}><img src={imgPrev} alt="p" style={{width:64,height:64,objectFit:"cover",borderRadius:"var(--r)",border:"2px solid var(--orng-bdr)"}}/><button onClick={()=>{setImg(null);setImgPrev(null);if(fRef.current)fRef.current.value="";}} style={{position:"absolute",top:-6,right:-6,background:"var(--dngr-bg)",color:"var(--dngr)",border:"none",borderRadius:"50%",width:18,height:18,cursor:"pointer",fontSize:12,fontWeight:700}}>×</button></div>}</div></div>
              <div style={{display:"flex",gap:8}}><Btn v="orng" onClick={save}>Guardar</Btn><Btn v="def" onClick={()=>{setAdding(false);setImg(null);setImgPrev(null);}}>Cancelar</Btn></div>
            </div>
          </Card>}
          <Card>
            <SHead title={"Semana "+selWeek+" — "+addDays(selWeek,5)} action={wItems.length>0&&<span style={{fontSize:12,fontFamily:M,fontWeight:600,color:"var(--orng)"}}>{wItems.length} ítems · {f$(wTotal)}</span>}/>
            {wItems.length===0?<Empty msg="Sin gastos para esta semana."/>:<>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr>{["Fecha","Categoría","Descripción","Monto","Recibo","Estado"].map(h=><th key={h} style={TH}>{h}</th>)}</tr></thead>
              <tbody>{wItems.sort((a,b)=>a.date.localeCompare(b.date)).map(r=><tr key={r.id} style={{opacity:r.invoiced?0.8:1}} onMouseOver={e=>e.currentTarget.style.background="var(--surf)"} onMouseOut={e=>e.currentTarget.style.background=""}>
                <td style={{...TD,fontFamily:M,fontSize:11,color:"var(--muted)"}}>{r.date}</td>
                <td style={TD}><span style={{background:"var(--orng-bg)",color:"var(--orng)",padding:"2px 8px",borderRadius:"var(--r)",fontSize:11,fontFamily:M,fontWeight:600}}>{r.category}</span></td>
                <td style={TD}><div style={{fontSize:12,fontWeight:500}}>{r.description}</div>{r.notes&&<div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{r.notes}</div>}</td>
                <td style={{...TD,fontFamily:M,fontWeight:700,color:"var(--orng)",fontSize:14}}>{f$(r.amount)}</td>
                <td style={TD}>{r.receipt?<img src={r.receipt} alt="r" onClick={()=>setViewImg(r.receipt)} style={{width:44,height:44,objectFit:"cover",borderRadius:"var(--r)",cursor:"pointer",border:"2px solid var(--orng-bdr)"}}/>:<span style={{fontSize:11,color:"var(--muted)",fontStyle:"italic"}}>Sin foto</span>}</td>
                <td style={TD}>{r.invoiced?<div><Badge status="Invoiced" label="Facturado ✓"/><div style={{fontSize:10,color:"var(--muted)",fontFamily:M,marginTop:3}}>{r.invoiceNum}</div></div>:<Badge status="PendInv" label="Pendiente"/>}</td>
              </tr>)}
              </tbody>
              <tfoot><tr style={{background:"var(--orng-bg)"}}><td colSpan={3} style={{...TDF,textAlign:"right",fontFamily:M,fontSize:12,color:"var(--orng)",fontWeight:600}}>TOTAL SEMANA</td><td style={{...TDF,fontFamily:M,fontWeight:700,fontSize:16,color:"var(--orng)"}}>{f$(wTotal)}</td><td colSpan={2} style={TDF}/></tr></tfoot>
            </table>
            {uninv.length>0&&<div style={{padding:"12px 15px",background:"#fff7ed",borderTop:"1px solid var(--orng-bdr)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontSize:13,fontWeight:600,color:"var(--orng)"}}>🧾 {uninv.length} gasto{uninv.length!==1?"s":""} sin facturar — {f$(uninv.reduce((s,r)=>s+r.amount,0))}</div><div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>Al generar se crea automáticamente una PA en PayApps</div></div>
              <Btn v="orng" onClick={genInvoice}>Generar Invoice →</Btn>
            </div>}
            </>}
          </Card>
        </>}

        {/* FIX 1: INVOICE HISTORY with search and reprint */}
        {invView==="invoices"&&<Card>
          <SHead title={"Historial de invoices reembolsables — "+proj.name} action={

/* ═══ PERSONNEL ═══ */
function Personnel({projects,workers,setWorkers,pending,setPending,timeEntries,setTimeEntries,role,addToast}){
  const[fpid,setFpid]=useState(projects[0]?.id);
  const[selWids,setSelWids]=useState([]);const[entryDate,setEntryDate]=useState(TODAY);const[clockIn,setClockIn]=useState("07:00");const[clockOut,setClockOut]=useState("");const[deadMins,setDeadMins]=useState(0);
  const[filterPid,setFilterPid]=useState("all");const[weekDate,setWeekDate]=useState(TODAY);const[payDate,setPayDate]=useState(getThursdayStart(TODAY));const[subTab,setSubTab]=useState("clock");
  const[newWForm,setNewWForm]=useState({name:"",role:"Ayudante",notes:""});const[addingNW,setAddingNW]=useState(false);const[apprData,setApprData]=useState({});
  const isMaster=role==="master";
  const h=calcH(clockIn,clockOut,deadMins||0);
  const allDayMap=useMemo(()=>{const m={};timeEntries.forEach(e=>{if(e.date===entryDate)m[e.workerId]=e.projectId;});return m;},[timeEntries,entryDate]);
  const getSt=(wid,pid)=>{const a=allDayMap[wid];return!a?"available":a===pid?"active":"unavailable";};
  const addEntry=()=>{if(!selWids.length||!fpid||!clockIn)return;const newEntries=[];for(const wid of selWids){const existing=timeEntries.find(e=>e.workerId===wid&&e.date===entryDate&&e.projectId!==fpid);if(existing){const wp=projects.find(p=>p.id===existing.projectId);alert((workers.find(w=>w.id===wid)?.name||"")+" ya tiene registro en '"+(wp?.name||"otro proyecto")+"' para este día. Omitido.");continue;}newEntries.push({id:Date.now()+Math.random(),projectId:fpid,workerId:wid,date:entryDate,clockIn,clockOut,hours:h>0?h:0,deadMins:deadMins||0});}if(newEntries.length){setTimeEntries(prev=>[...prev,...newEntries]);addToast("✅ "+newEntries.length+" entrada"+(newEntries.length!==1?"s":"")+" registrada"+(newEntries.length!==1?"s":"")+" correctamente.","succ");}setSelWids([]);setClockOut("");setDeadMins(0);};
  const closeEntry=(eid,out)=>{const ci=timeEntries.find(e=>e.id===eid)?.clockIn||"";const dm=timeEntries.find(e=>e.id===eid)?.deadMins||0;const hh=calcH(ci,out,dm);setTimeEntries(timeEntries.map(e=>e.id===eid?{...e,clockOut:out,hours:hh>0?hh:0}:e));};
  // FIX 1: only master can delete time entries
  const delEntry=id=>{if(!isMaster)return;if(confirm("¿Eliminar?"))setTimeEntries(timeEntries.filter(e=>e.id!==id));};
  const propose=()=>{if(!newWForm.name.trim())return;setPending([...pending,{id:Date.now(),name:newWForm.name.trim(),role:newWForm.role,notes:newWForm.notes,date:TODAY}]);setNewWForm({name:"",role:"Ayudante",notes:""});setAddingNW(false);addToast("✅ Solicitud enviada para "+newWForm.name,"succ");};
  const setAD=(id,f,v)=>setApprData(p=>({...p,[id]:{...p[id],[f]:v}}));
  const approve=(pwid,payType,rate)=>{const pw=pending.find(w=>w.id===pwid);if(!pw||!rate)return;const nw={id:Date.now(),name:pw.name,role:pw.role,appRole:"worker",payType,hourlyRate:payType==="hourly"?+rate:null,weeklyRate:payType==="salary"?+rate:null};setWorkers([...workers,nw]);setPending(pending.filter(w=>w.id!==pwid));addToast("✅ "+pw.name+" aprobado.","succ");};
  const reject=id=>{const pw=pending.find(w=>w.id===id);setPending(pending.filter(w=>w.id!==id));addToast("Solicitud de "+(pw?.name||"")+" rechazada.","warn");};
  const ws=getThursdayStart(weekDate);const wEndD=new Date(ws+"T12:00:00");wEndD.setDate(wEndD.getDate()+6);const wEndStr=wEndD.toISOString().split("T")[0];
  const wEntries=timeEntries.filter(e=>e.date>=ws&&e.date<=wEndStr);
  const weeklySummary=useMemo(()=>workers.map(w=>{const we=wEntries.filter(e=>e.workerId===w.id&&e.hours>0);const totalH=we.reduce((s,e)=>s+e.hours,0);let totalCost;if(w.payType==="salary"){const days=new Set(we.map(e=>e.date)).size;totalCost=days*dailyRate(w);}else{totalCost=we.reduce((s,e)=>s+e.hours*(w.hourlyRate||0),0);}const byProject=projects.map(p=>{const pe=we.filter(e=>e.projectId===p.id);const ph=pe.reduce((s,e)=>s+e.hours,0);let pc;if(w.payType==="salary"){const dd=new Set(pe.map(e=>e.date)).size;pc=dd*dailyRate(w);}else{pc=pe.reduce((s,e)=>s+e.hours*(w.hourlyRate||0),0);}return{...p,hours:ph,cost:pc};}).filter(p=>p.hours>0);return{...w,totalH,totalCost,byProject};}).filter(w=>w.totalH>0),[wEntries,workers,projects]);

  const isClockRole=role==="foreman"||role==="supervisor"||role==="master";
  if(isClockRole){
    const proj=projects.find(p=>p.id===fpid);const todayLog=timeEntries.filter(e=>e.projectId===fpid&&e.date===entryDate);
    return<div style={{maxWidth:640,margin:"0 auto"}}>
      <Card style={{padding:22,marginBottom:16}}>
        <div style={{textAlign:"center",marginBottom:18}}><div style={{fontSize:10,color:"var(--muted)",fontFamily:M,marginBottom:4,letterSpacing:"0.1em",textTransform:"uppercase"}}>Registro de horas</div><div style={{fontSize:18,fontWeight:700,color:role==="supervisor"?"var(--purp)":"var(--info)"}}>{proj?.name||"Sin proyecto"}</div><div style={{fontSize:11,color:"var(--muted)",marginTop:4,fontFamily:M}}>−30 min almuerzo si {">"} 5 hrs · Salario = tarifa diaria fija</div></div>
        <Slct label="Proyecto" value={fpid||""} onChange={e=>{setFpid(+e.target.value);setSelWid(null);}}>{projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</Slct>
        <div style={{marginBottom:12}}><div style={{fontSize:11,color:"var(--muted)",fontFamily:M,marginBottom:7}}>Seleccionar trabajadores — clic para marcar/desmarcar individualmente</div><div style={{display:"flex",gap:7,marginBottom:8,flexWrap:"wrap"}}><Btn v="succ" sm onClick={()=>setSelWids(workers.filter(w=>getSt(w.id,fpid)!=="unavailable").map(w=>w.id))}>✓ Seleccionar todos</Btn>{selWids.length>0&&<Btn v="dngr" sm onClick={()=>setSelWids([])}>✗ Deseleccionar todos</Btn>}{selWids.length>0&&<span style={{fontSize:11,fontFamily:M,color:"var(--succ)",fontWeight:600,alignSelf:"center"}}>{selWids.length} seleccionado{selWids.length!==1?"s":""}</span>}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(155px,1fr))",gap:7}}>{workers.map(w=>{const st=getSt(w.id,fpid);const unavail=st==="unavailable";const isSel=selWids.includes(w.id);const asgN=unavail?projects.find(p=>p.id===allDayMap[w.id])?.name:"";
            return<div key={w.id} onClick={()=>{if(!unavail)setSelWids(prev=>isSel?prev.filter(x=>x!==w.id):[...prev,w.id]);}} style={{padding:"9px 12px",borderRadius:"var(--r)",border:isSel?"1.5px solid var(--succ-bdr)":unavail?"1px dashed var(--dis-bdr)":"0.5px solid var(--bdrMd)",background:isSel?"var(--succ-bg)":unavail?"var(--dis-bg)":"var(--surf)",cursor:unavail?"not-allowed":"pointer",opacity:unavail?0.6:1}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:2}}>
                <div style={{fontSize:13,fontWeight:600,color:unavail?"var(--muted)":isSel?"var(--succ)":"var(--text)"}}>{w.name}</div>
                {isSel&&<span style={{background:"var(--succ-bdr)",color:"white",borderRadius:"50%",width:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0}}>✓</span>}

        <Card style={{padding:"14px 15px",background:"var(--warn-bg)",borderColor:"var(--warn-bdr)"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontWeight:700,fontSize:14,color:"var(--warn)"}}>Total nómina semana</div><div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{ws} — {wEndStr}</div></div><div style={{fontSize:24,fontWeight:700,fontFamily:M,color:"var(--warn)"}}>{f$(weeklySummary.reduce((s,w)=>s+w.totalCost,0))}</div></div></Card>
      </div>}
    </div>}
    {subTab==="costs"&&<div>
      <div style={{display:"grid",gridTemplateColumns:"repeat("+Math.min(projects.length,3)+",minmax(0,1fr))",gap:12,marginBottom:16}}>
        {projCosts.map(p=><Card key={p.id} style={{padding:"14px 16px"}}><div style={{fontSize:12,color:"var(--muted)",fontWeight:500,marginBottom:8}}>{p.name}</div><div style={{fontSize:24,fontWeight:700,fontFamily:M,color:"var(--warn)",marginBottom:3}}>{f$(p.laborCost)}</div><div style={{fontSize:11,color:"var(--muted)",marginBottom:8}}>{p.totalHours}h trabajadas</div><Bar value={p.laborCost} max={p.contractValue*0.35}/><div style={{fontSize:10,color:"var(--muted)",fontFamily:M,marginTop:4}}>{pct(p.laborCost,p.contractValue*0.35)}% del budget</div></Card>)}
      </div>
      <Card><SHead title="Personal completo"/>
        <table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr>{["Trabajador","Rol","Tipo","Tarifa","Horas totales","Costo acum.","Estado"].map(h=><th key={h} style={TH}>{h}</th>)}</tr></thead>
        <tbody>{workers.map(w=>{const asgPid=Object.entries(allDayMap).find(([wid])=>+wid===w.id)?.[1];const asgProj=projects.find(p=>p.id===asgPid);const allE=timeEntries.filter(e=>e.workerId===w.id&&e.hours>0);const totalH=allE.reduce((s,e)=>s+e.hours,0);const totalC=allE.reduce((s,e)=>s+entryCost(e,w),0);return<tr key={w.id} onMouseOver={e=>e.currentTarget.style.background="var(--surf)"} onMouseOut={e=>e.currentTarget.style.background=""}>
          <td style={{...TD,fontWeight:600}}>{w.name}</td><td style={{...TD,fontSize:12,color:"var(--muted)"}}>{w.role}</td>
          <td style={TD}>{w.payType==="salary"?<Badge status="Salario" label={f$(w.weeklyRate)+"/sem"}/>:<Badge status="Hora" label={"$"+w.hourlyRate+"/hr"}/>}</td>
          <td style={{...TD,fontFamily:M,fontSize:12}}>{w.payType==="salary"?f$(dailyRate(w))+"/día":"$"+w.hourlyRate+"/hr"}</td>
          <td style={{...TD,fontFamily:M,fontWeight:600}}>{totalH}h</td><td style={{...TD,fontFamily:M,fontWeight:700,color:"var(--succ)"}}>{f$(totalC)}</td>
          <td style={TD}><Badge status={asgPid?"Active":"Available"} label={asgPid?"Activo — "+(asgProj?.name||""):"Disponible"}/></td>
        </tr>;})}
        </tbody></table>
      </Card>
    </div>}
  </div>;
}

/* ═══ COMPRAS + GASTOS ═══ */
const PCATS=["Materiales","Herramientas","Insumos","Equipos","Transporte","Subcontrato","Otros"];
const GCATS=["Seguro de compañía","Seguro de vehículos","Gasolina","Contabilidad","Registros / Licencias","Herramientas generales","Comunicaciones","Comidas","Otros"];
function Compras({projects,purchases,setPurchases,expenses,setExpenses,role}){

  const[eForm,setEForm]=useState({date:TODAY,description:"",category:"Gasolina",amount:"",notes:""});const[eImg,setEImg]=useState(null);const[eImgPrev,setEImgPrev]=useState(null);const[addingE,setAddingE]=useState(false);
  const fRef=useRef();const eRef=useRef();
  const isMaster=role==="master";
  const hF=e=>{const f=e.target.files[0];if(!f)return;if(f.size>5*1024*1024){alert("Imagen muy grande.");return;}const r=new FileReader();r.onload=ev=>{setImg(ev.target.result);setImgPrev(ev.target.result);};r.readAsDataURL(f);};
  const hEF=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{setEImg(ev.target.result);setEImgPrev(ev.target.result);};r.readAsDataURL(f);};
  const saveP=()=>{if(!form.description||!form.amount||!form.projectId)return;setPurchases([...purchases,{id:Date.now(),projectId:+form.projectId,date:form.date,description:form.description,category:form.category,amount:+form.amount,notes:form.notes,receipt:img}]);setForm({projectId:projects[0]?.id||"",date:TODAY,description:"",category:"Materiales",amount:"",notes:""});setImg(null);setImgPrev(null);if(fRef.current)fRef.current.value="";setAdding(false);};
  const saveE=()=>{if(!eForm.description||!eForm.amount)return;setExpenses([...expenses,{id:Date.now(),date:eForm.date,description:eForm.description,category:eForm.category,amount:+eForm.amount,notes:eForm.notes,receipt:eImg}]);setEForm({date:TODAY,description:"",category:"Gasolina",amount:"",notes:""});setEImg(null);setEImgPrev(null);if(eRef.current)eRef.current.value="";setAddingE(false);};
  const filt=filterPid==="all"?purchases:purchases.filter(p=>p.projectId===+filterPid);
  const totFilt=filt.reduce((s,p)=>s+p.amount,0);const totExp=expenses.reduce((s,e)=>s+e.amount,0);const bP=projects.map(p=>({...p,total:purchases.filter(pu=>pu.projectId===p.id).reduce((s,pu)=>s+pu.amount,0),count:purchases.filter(pu=>pu.projectId===p.id).length}));

      {[["compras","Compras por proyecto"],["gastos","Gastos generales"]].map(([v,l],i)=>(<div key={v} onClick={()=>setView(v)} style={{padding:"7px 16px",cursor:"pointer",fontSize:12,fontFamily:M,background:view===v?v==="compras"?"var(--purp-bg)":"var(--teal-bg)":"transparent",color:view===v?v==="compras"?"var(--purp)":"var(--teal)":"var(--muted)",fontWeight:view===v?600:400,borderRight:i===0?"0.5px solid var(--bdrMd)":"none"}}>{l}</div>))}
    </div>
    {view==="compras"&&<>
      <div style={{display:"grid",gridTemplateColumns:"repeat("+Math.min(projects.length,4)+",minmax(0,1fr))",gap:10,marginBottom:16}}>{bP.map(p=><Kpi key={p.id} label={p.name} value={f$(p.total)} sub={p.count+" compra"+(p.count!==1?"s":"")} color="var(--purp)"/>)}</div>
      <Card>
        <SHead title="Compras & materiales por proyecto" action={<div style={{display:"flex",gap:8,alignItems:"center"}}><select value={filterPid} onChange={e=>setFilterPid(e.target.value)} style={{background:"var(--bg)",border:"0.5px solid var(--bdrMd)",color:"var(--text)",padding:"5px 9px",borderRadius:"var(--r)",fontSize:12,fontFamily:M,outline:"none"}}><option value="all">Todos</option>{projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select><Btn v="purp" sm onClick={()=>setAdding(!adding)}>+ Nueva compra</Btn></div>}/>
        {adding&&<div style={{padding:"16px 15px",background:"var(--purp-bg)",borderBottom:"1px solid var(--purp-bdr)"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:8}}><Slct label="Proyecto" value={form.projectId} onChange={e=>setForm({...form,projectId:e.target.value})}>{projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</Slct><Fld label="Fecha" type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/><Slct label="Categoría" value={form.category} onChange={e=>setForm({...form,category:e.target.value})}>{PCATS.map(c=><option key={c}>{c}</option>)}</Slct></div>
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:10,marginBottom:8}}><Fld label="Descripción" value={form.description} onChange={e=>setForm({...form,description:e.target.value})} placeholder="Ej: Bloques 8x8x16 — 200 uds"/><Fld label="Monto ($)" type="number" value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})} placeholder="0.00"/></div>
          <div style={{marginBottom:10}}><div style={{fontSize:11,color:"var(--muted)",marginBottom:5,fontFamily:M}}>Foto de la factura</div><div style={{display:"flex",gap:10,alignItems:"center"}}><input ref={fRef} type="file" accept="image/*" capture="environment" onChange={hF} style={{fontSize:12,color:"var(--text)"}}/>{imgPrev&&<div style={{position:"relative"}}><img src={imgPrev} alt="p" style={{width:64,height:64,objectFit:"cover",borderRadius:"var(--r)",border:"2px solid var(--purp-bdr)"}}/><button onClick={()=>{setImg(null);setImgPrev(null);if(fRef.current)fRef.current.value="";}} style={{position:"absolute",top:-6,right:-6,background:"var(--dngr-bg)",color:"var(--dngr)",border:"none",borderRadius:"50%",width:18,height:18,cursor:"pointer",fontSize:12,fontWeight:700}}>×</button></div>}</div></div>
          <Fld label="Proveedor / notas" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="Proveedor, # orden..."/>
          <div style={{display:"flex",gap:8}}><Btn v="purp" onClick={saveP}>Guardar</Btn><Btn v="def" onClick={()=>{setAdding(false);setImg(null);setImgPrev(null);}}>Cancelar</Btn></div>
        </div>}
        {filt.length===0?<Empty msg="Sin compras registradas."/>:
        <table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr>{["Fecha","Proyecto","Categoría","Descripción","Monto","Foto",isMaster?"":""].map(h=><th key={h} style={TH}>{h}</th>)}</tr></thead>
        <tbody>{filt.sort((a,b)=>b.date.localeCompare(a.date)).map(pu=>{const pj=projects.find(p=>p.id===pu.projectId);return<tr key={pu.id} onMouseOver={e=>e.currentTarget.style.background="var(--surf)"} onMouseOut={e=>e.currentTarget.style.background=""}><td style={{...TD,fontFamily:M,fontSize:11,color:"var(--muted)"}}>{pu.date}</td><td style={{...TD,fontSize:12,fontWeight:500}}>{pj?.name}</td><td style={TD}><span style={{background:"var(--purp-bg)",color:"var(--purp)",padding:"2px 8px",borderRadius:"var(--r)",fontSize:11,fontFamily:M,fontWeight:600}}>{pu.category}</span></td><td style={TD}><div style={{fontSize:12}}>{pu.description}</div>{pu.notes&&<div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{pu.notes}</div>}</td><td style={{...TD,fontFamily:M,fontWeight:700,color:"var(--purp)",fontSize:14}}>{f$(pu.amount)}</td><td style={TD}>{pu.receipt?<img src={pu.receipt} alt="f" onClick={()=>setViewImg(pu.receipt)} style={{width:44,height:44,objectFit:"cover",borderRadius:"var(--r)",cursor:"pointer",border:"2px solid var(--purp-bdr)"}}/>:<span style={{fontSize:11,color:"var(--muted)",fontStyle:"italic"}}>Sin foto</span>}</td>{isMaster&&<td style={TD}><Btn sm v="dngr" onClick={()=>{if(confirm("¿Eliminar?"))setPurchases(purchases.filter(p=>p.id!==pu.id));}} style={{padding:"1px 6px"}}>×</Btn></td>}</tr>;})}
        </tbody><tfoot><tr style={{background:"var(--surf)"}}><td colSpan={4} style={{...TDF,textAlign:"right",fontFamily:M,fontSize:12,color:"var(--muted)",fontWeight:600}}>TOTAL</td><td style={{...TDF,fontFamily:M,fontWeight:700,fontSize:15,color:"var(--purp)"}}>{f$(totFilt)}</td><td colSpan={isMaster?2:1} style={TDF}/></tr></tfoot></table>}
      </Card>
    </>}
    {view==="gastos"&&<>
      <Kpi label="Total gastos generales" value={f$(totExp)} sub={expenses.length+" registro"+(expenses.length!==1?"s":"")} color="var(--teal)"/>
      <div style={{height:12}}/>
      <Card>
        <SHead title="Gastos generales de operación" action={<Btn v="teal" sm onClick={()=>setAddingE(!addingE)}>+ Nuevo gasto</Btn>}/>
        {addingE&&<div style={{padding:"16px 15px",background:"var(--teal-bg)",borderBottom:"1px solid var(--teal-bdr)"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:8}}><Fld label="Fecha" type="date" value={eForm.date} onChange={e=>setEForm({...eForm,date:e.target.value})}/><Slct label="Categoría" value={eForm.category} onChange={e=>setEForm({...eForm,category:e.target.value})}>{GCATS.map(c=><option key={c}>{c}</option>)}</Slct></div>
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:10,marginBottom:8}}><Fld label="Descripción" value={eForm.description} onChange={e=>setEForm({...eForm,description:e.target.value})} placeholder="Ej: Póliza seguro — Mayo 2026"/><Fld label="Monto ($)" type="number" value={eForm.amount} onChange={e=>setEForm({...eForm,amount:e.target.value})} placeholder="0.00"/></div>
          <div style={{marginBottom:10}}><div style={{fontSize:11,color:"var(--muted)",marginBottom:5,fontFamily:M}}>Foto del recibo</div><div style={{display:"flex",gap:10,alignItems:"center"}}><input ref={eRef} type="file" accept="image/*" capture="environment" onChange={hEF} style={{fontSize:12,color:"var(--text)"}}/>{eImgPrev&&<div style={{position:"relative"}}><img src={eImgPrev} alt="p" style={{width:64,height:64,objectFit:"cover",borderRadius:"var(--r)",border:"2px solid var(--teal-bdr)"}}/><button onClick={()=>{setEImg(null);setEImgPrev(null);if(eRef.current)eRef.current.value="";}} style={{position:"absolute",top:-6,right:-6,background:"var(--dngr-bg)",color:"var(--dngr)",border:"none",borderRadius:"50%",width:18,height:18,cursor:"pointer",fontSize:12,fontWeight:700}}>×</button></div>}</div></div>
          <Fld label="Notas" value={eForm.notes} onChange={e=>setEForm({...eForm,notes:e.target.value})} placeholder="Proveedor, número de póliza..."/>
          <div style={{display:"flex",gap:8}}><Btn v="teal" onClick={saveE}>Guardar</Btn><Btn v="def" onClick={()=>{setAddingE(false);setEImg(null);setEImgPrev(null);}}>Cancelar</Btn></div>
        </div>}
        {expenses.length===0?<Empty msg="Sin gastos generales registrados."/>:
        <table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr>{["Fecha","Categoría","Descripción","Monto","Recibo",isMaster?"":""].map(h=><th key={h} style={TH}>{h}</th>)}</tr></thead>
        <tbody>{expenses.sort((a,b)=>b.date.localeCompare(a.date)).map(ex=><tr key={ex.id} onMouseOver={e=>e.currentTarget.style.background="var(--surf)"} onMouseOut={e=>e.currentTarget.style.background=""}><td style={{...TD,fontFamily:M,fontSize:11,color:"var(--muted)"}}>{ex.date}</td><td style={TD}><span style={{background:"var(--teal-bg)",color:"var(--teal)",padding:"2px 8px",borderRadius:"var(--r)",fontSize:11,fontFamily:M,fontWeight:600}}>{ex.category}</span></td><td style={TD}><div style={{fontSize:12}}>{ex.description}</div>{ex.notes&&<div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{ex.notes}</div>}</td><td style={{...TD,fontFamily:M,fontWeight:700,color:"var(--teal)",fontSize:14}}>{f$(ex.amount)}</td><td style={TD}>{ex.receipt?<img src={ex.receipt} alt="r" onClick={()=>setViewImg(ex.receipt)} style={{width:44,height:44,objectFit:"cover",borderRadius:"var(--r)",cursor:"pointer",border:"2px solid var(--teal-bdr)"}}/>:<span style={{fontSize:11,color:"var(--muted)",fontStyle:"italic"}}>Sin foto</span>}</td>{isMaster&&<td style={TD}><Btn sm v="dngr" onClick={()=>{if(confirm("¿Eliminar?"))setExpenses(expenses.filter(e=>e.id!==ex.id));}} style={{padding:"1px 6px"}}>×</Btn></td>}</tr>)}
        </tbody><tfoot><tr style={{background:"var(--surf)"}}><td colSpan={3} style={{...TDF,textAlign:"right",fontFamily:M,fontSize:12,color:"var(--muted)",fontWeight:600}}>TOTAL</td><td style={{...TDF,fontFamily:M,fontWeight:700,fontSize:15,color:"var(--teal)"}}>{f$(totExp)}</td><td colSpan={isMaster?2:1} style={TDF}/></tr></tfoot></table>}
      </Card>
    </>}
    {viewImg&&<div onClick={()=>setViewImg(null)} style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9998,cursor:"pointer"}}><div style={{position:"relative"}}><img src={viewImg} alt="r" style={{maxWidth:"90vw",maxHeight:"90vh",borderRadius:"var(--r)"}}/><button onClick={()=>setViewImg(null)} style={{position:"absolute",top:-12,right:-12,background:"var(--dngr-bg)",color:"var(--dngr)",border:"1px solid var(--dngr-bdr)",borderRadius:"50%",width:28,height:28,cursor:"pointer",fontSize:16,fontWeight:700}}>×</button></div></div>}
  </div>);
}

/* ═══ DASHBOARD ═══ */
function Dashboard({projects,timeEntries,workers,purchases,expenses,reimb}){
  const[selPid,setSelPid]=useState(null);
  const totalC=projects.reduce((s,p)=>s+p.contractValue,0);
  const totalPaid=projects.reduce((s,p)=>s+p.payApps.filter(pa=>pa.status==="Paid").reduce((ss,pa)=>ss+pa.amount,0),0);
  const totalSent=projects.reduce((s,p)=>s+p.payApps.filter(pa=>pa.status==="Sent").reduce((ss,pa)=>ss+pa.amount,0),0);
  const labor=timeEntries.filter(e=>e.hours>0).reduce((s,e)=>{const w=workers.find(w=>w.id===e.workerId);return s+entryCost(e,w);},0);
  const totMat=purchases.reduce((s,p)=>s+p.amount,0);const totExp=expenses.reduce((s,e)=>s+e.amount,0);
  const pendReim=reimb.filter(r=>!r.invoiced).reduce((s,r)=>s+r.amount,0);
  const pendCOs=projects.reduce((s,p)=>s+p.changeOrders.filter(c=>c.status==="Submitted").length,0);
  const activeToday=new Set(timeEntries.filter(e=>e.date===TODAY&&(!e.clockOut||e.clockOut==="")).map(e=>e.workerId)).size;
  const projFinancials=projects.map(p=>{
    const ingresos=p.payApps.filter(pa=>pa.status==="Paid").reduce((s,pa)=>s+pa.amount,0);
    const porCobrar=p.payApps.filter(pa=>pa.status==="Sent").reduce((s,pa)=>s+pa.amount,0);
    const totalFacturado=p.payApps.reduce((s,pa)=>s+pa.amount,0);
    const laborCost=timeEntries.filter(e=>e.projectId===p.id&&e.hours>0).reduce((s,e)=>{const w=workers.find(w=>w.id===e.workerId);return s+entryCost(e,w);},0);
    const matCost=purchases.filter(pu=>pu.projectId===p.id).reduce((s,pu)=>s+pu.amount,0);
    const reimbCost=reimb.filter(r=>r.projectId===p.id).reduce((s,r)=>s+r.amount,0);
    const totalGastos=laborCost+matCost;const saldo=ingresos-totalGastos;
    return{...p,ingresos,porCobrar,totalFacturado,laborCost,matCost,reimbCost,totalGastos,saldo};
  });
  const selProj=selPid?projFinancials.find(p=>p.id===selPid):null;
  return<div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(2,minmax(0,1fr))",gap:10,marginBottom:16}}>
      <Kpi label="Contrato total" value={f$(totalC)} sub={projects.length+" proyectos"}/>
      <Kpi label="Cobrado (Paid)" value={f$(totalPaid)} sub={"Por cobrar: "+f$(totalSent)} color="var(--succ)"/>
      <Kpi label="Reembolsables pendientes" value={f$(pendReim)} color="var(--orng)"/>
      <Kpi label="Gastos operacionales" value={f$(labor+totMat+totExp)} sub={"Labor: "+f$(labor)+" · Mat: "+f$(totMat)} color="var(--purp)"/>
    </div>
    {(pendCOs>0||activeToday>0||pendReim>0)&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:10,marginBottom:16}}>
      {pendCOs>0&&<div style={{background:"var(--warn-bg)",border:"1px solid var(--warn-bdr)",borderRadius:"var(--r)",padding:"10px 15px",display:"flex",justifyContent:"space-between"}}><span style={{fontSize:13,color:"var(--warn)",fontWeight:600}}>{pendCOs} CO{pendCOs!==1?"s":""} pendiente{pendCOs!==1?"s":""}</span><span style={{fontSize:11,color:"var(--warn)",fontFamily:M}}>→ PayApps</span></div>}
      {pendReim>0&&<div style={{background:"var(--orng-bg)",border:"1px solid var(--orng-bdr)",borderRadius:"var(--r)",padding:"10px 15px",display:"flex",justifyContent:"space-between"}}><span style={{fontSize:13,color:"var(--orng)",fontWeight:600}}>{f$(pendReim)} reembolsables sin facturar</span><span style={{fontSize:11,color:"var(--orng)",fontFamily:M}}>→ Reembolsables</span></div>}
      {activeToday>0&&<div style={{background:"var(--succ-bg)",border:"1px solid var(--succ-bdr)",borderRadius:"var(--r)",padding:"10px 15px",display:"flex",justifyContent:"space-between"}}><span style={{fontSize:13,color:"var(--succ)",fontWeight:600}}>{activeToday} trabajador{activeToday!==1?"es":""} activo{activeToday!==1?"s":""}</span><span style={{fontSize:11,color:"var(--succ)",fontFamily:M}}>→ Personal</span></div>}
    </div>}
    <div style={{fontSize:12,color:"var(--muted)",marginBottom:10,fontFamily:M}}>Haz clic en un proyecto para ver el estado financiero detallado</div>
    <div style={{display:"grid",gridTemplateColumns:"repeat("+Math.min(projects.length,3)+",minmax(0,1fr))",gap:12,marginBottom:16}}>
      {projFinancials.map(p=>{const sel=selPid===p.id;const sPos=p.saldo>=0;return<div key={p.id} onClick={()=>setSelPid(sel?null:p.id)} style={{background:sel?"var(--info-bg)":"var(--bg)",border:sel?"1.5px solid var(--info-bdr)":"0.5px solid var(--bdr)",borderRadius:"var(--rLg)",padding:"16px",cursor:"pointer",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",transition:"all 0.15s"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
          <div><div style={{fontSize:15,fontWeight:700,marginBottom:3}}>{p.name}</div><div style={{fontSize:11,color:"var(--muted)"}}>{p.client||"Sin cliente"}</div></div>
          <div style={{textAlign:"right"}}><div style={{fontSize:11,color:"var(--muted)",marginBottom:2}}>Saldo neto</div><div style={{fontSize:20,fontWeight:700,fontFamily:M,color:sPos?"var(--succ)":"var(--dngr)"}}>{f$(p.saldo)}</div></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:12}}>

function App(){
  const[loaded,setLoaded]=useState(false);const[saving,setSaving]=useState(false);const[savedOk,setSavedOk]=useState(false);
  const[loggedUser,setLoggedUser]=useState(null);
  const[tab,setTab]=useState("dashboard");const[role,setRole]=useState("master");
  const[projects,setProjects]=useState(DEFAULT_PROJECTS);const[estimates,setEstimates]=useState(DEFAULT_ESTIMATES);const[workers,setWorkers]=useState(DEFAULT_WORKERS);const[timeEntries,setTimeEntries]=useState(DEFAULT_ENTRIES);const[purchases,setPurchases]=useState(DEFAULT_PURCHASES);const[expenses,setExpenses]=useState(DEFAULT_EXPENSES);const[pending,setPending]=useState(DEFAULT_PENDING);const[reimb,setReimb]=useState(DEFAULT_REIMB);
  const timer=useRef(null);
  const{toasts,addToast}=useNotifications(timeEntries);
  // PIN users stored locally
  const[pinUsers,setPinUsers]=useState(DEFAULT_USERS);
  useEffect(()=>{try{const u=localStorage.getItem("nw:users");if(u)setPinUsers(JSON.parse(u));}catch(e){}});
  const handleLogin=(user)=>{setLoggedUser(user);setRole(user.role);setTab(tabsByRole[user.role]?.[0]?.id||"dashboard");};
  const handleLogout=()=>{setLoggedUser(null);setRole("master");setTab("dashboard");};
  useEffect(()=>{
    const load=async()=>{
      try{
        // Map: supabase key → [setter, old localStorage key]
        const keys=[
          ["projects",  setProjects,  "nw82:p"],
          ["estimates", setEstimates, "nw82:e"],
          ["workers",   setWorkers,   "nw82:w"],
          ["timeEntries",setTimeEntries,"nw82:t"],
          ["purchases", setPurchases, "nw82:pu"],
          ["expenses",  setExpenses,  "nw82:ex"],
          ["pending",   setPending,   "nw82:pw"],
          ["reimb",     setReimb,     "nw82:rm"],
        ];
        let needsMigration=false;
        await Promise.all(keys.map(async([k,setter,oldKey])=>{
          // 1. Try Supabase first
          const sbVal=await sbGet(k);
          if(sbVal&&Array.isArray(sbVal)&&sbVal.length>0){
            setter(sbVal);
            return;
          }
          // 2. Supabase empty — check old localStorage for migration
          try{
            const lsVal=localStorage.getItem(oldKey);
            if(lsVal){
              const parsed=JSON.parse(lsVal);
              if(Array.isArray(parsed)&&parsed.length>0){
                setter(parsed);
                // Save to Supabase (migration)
                await sbSet(k,parsed);
                needsMigration=true;
                console.log("Migrated",k,"to Supabase:",parsed.length,"items");
              }
            }
          }catch(e){console.error("Migration error for",k,e);}
        }));
        if(needsMigration)console.log("✅ Data migrated from localStorage to Supabase");
      }catch(e){console.error("Load error:",e);}
      setLoaded(true);
    };
    load();
    // Real-time sync: when another device saves, reload that key
    const channel=sb.channel("nw_admin_sync")
      .on("postgres_changes",{event:"UPDATE",schema:"public",table:"app_data"},(payload)=>{
        const{key,value}=payload.new;
        const map={projects:setProjects,estimates:setEstimates,workers:setWorkers,timeEntries:setTimeEntries,purchases:setPurchases,expenses:setExpenses,pending:setPending,reimb:setReimb};
        if(map[key]&&Array.isArray(value))map[key](value);
      })
      .subscribe();
    return()=>sb.removeChannel(channel);
  },[]);
  useEffect(()=>{
    if(!loaded)return;
    if(timer.current)clearTimeout(timer.current);
    setSaving(true);setSavedOk(false);
    timer.current=setTimeout(async()=>{
      try{
        await Promise.all([
          sbSet("projects",projects),
          sbSet("estimates",estimates),
          sbSet("workers",workers),
          sbSet("timeEntries",timeEntries),
          sbSet("purchases",purchases),
          sbSet("expenses",expenses),
          sbSet("pending",pending),
          sbSet("reimb",reimb),
        ]);
        // Also keep localStorage as backup
        [["nw82:p",projects],["nw82:e",estimates],["nw82:w",workers],["nw82:t",timeEntries],["nw82:pu",purchases],["nw82:ex",expenses],["nw82:pw",pending],["nw82:rm",reimb]].forEach(([k,v])=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}});
        setSaving(false);setSavedOk(true);
        setTimeout(()=>setSavedOk(false),2500);
      }catch(e){console.error("Save error:",e);setSaving(false);}
    },800);
  },[projects,estimates,workers,timeEntries,purchases,expenses,pending,reimb,loaded]);
  const reset=()=>{setProjects(DEFAULT_PROJECTS);setEstimates(DEFAULT_ESTIMATES);setWorkers(DEFAULT_WORKERS);setTimeEntries(DEFAULT_ENTRIES);setPurchases(DEFAULT_PURCHASES);setExpenses(DEFAULT_EXPENSES);setPending(DEFAULT_PENDING);setReimb(DEFAULT_REIMB);};
  const pendCount=pending.length;const pendReimCount=reimb.filter(r=>!r.invoiced).length;
  const tabsByRole={
    master:[{id:"dashboard",label:"Dashboard"},{id:"payapps",label:"PayApps & Invoices"},{id:"estimates",label:"Presupuestos"},{id:"personnel",label:"Personal",badge:pendCount},{id:"reimb",label:"Reembolsables",badge:pendReimCount},{id:"compras",label:"Compras & Gastos"},{id:"settings",label:"Configuración"}],
    supervisor:[{id:"personnel",label:"Time Clock",badge:pendCount},{id:"reimb",label:"Reembolsables",badge:pendReimCount},{id:"compras",label:"Compras & Gastos"}],
    foreman:[{id:"personnel",label:"Time Clock",badge:pendCount}],
  };
  const visTabs=tabsByRole[role]||tabsByRole.foreman;const cur=visTabs.some(t=>t.id===tab)?tab:visTabs[0]?.id;const rc=ROLES[role];
  // Build tabsByRole early so handleLogin can use it
  const tabsByRoleEarly={
    master:[{id:"dashboard"},{id:"payapps"},{id:"estimates"},{id:"personnel"},{id:"reimb"},{id:"compras"},{id:"settings"}],
    supervisor:[{id:"personnel"},{id:"reimb"},{id:"compras"}],
    foreman:[{id:"personnel"}],
  };
  if(!loggedUser)return<LoginScreen onLogin={handleLogin}/>;
  if(!loaded)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"70vh",flexDirection:"column",gap:12,color:"var(--muted)",fontFamily:M,fontSize:14}}><div style={{width:32,height:32,borderRadius:"50%",border:"3px solid var(--warn-bg)",borderTopColor:"var(--warn-bdr)",animation:"spin 0.8s linear infinite"}}/><span>Cargando N&W Administración...</span></div>;
  const isMob=typeof window!=="undefined"&&window.innerWidth<640;
  const tabIcons={dashboard:"🏠",payapps:"📄",estimates:"📋",personnel:"⏱",reimb:"🧾",compras:"🛒",settings:"⚙️"};
  return<div style={{fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",color:"var(--text)"}}>
    <Toasts toasts={toasts}/>
    {/* DESKTOP NAV */}
    <div style={{background:"var(--bg)",border:"0.5px solid var(--bdr)",borderRadius:"var(--rLg)",marginBottom:18,padding:"0 18px",display:"flex",alignItems:"center",minHeight:52,boxShadow:"0 2px 8px rgba(0,0,0,0.07)",position:"sticky",top:0,zIndex:100,flexWrap:"nowrap"}}>
      <div style={{fontFamily:M,fontWeight:700,fontSize:15,color:"var(--warn)",marginRight:16,letterSpacing:"0.06em",whiteSpace:"nowrap",flexShrink:0}}>N&W</div>
      <div style={{display:"flex",flex:1,gap:0,overflowX:"auto",msOverflowStyle:"none",scrollbarWidth:"none"}}>
        {visTabs.map(t=><div key={t.id} onClick={()=>setTab(t.id)} style={{padding:"0 10px",height:52,display:"flex",alignItems:"center",gap:4,cursor:"pointer",fontSize:12,fontWeight:cur===t.id?600:400,color:cur===t.id?rc.color:"var(--muted)",borderBottomWidth:"2.5px",borderBottomStyle:"solid",borderBottomColor:cur===t.id?rc.color:"transparent",transition:"all 0.15s",whiteSpace:"nowrap",flexShrink:0}}>
          <span style={{display:"none"}}>{tabIcons[t.id]||""}</span>
          {t.label}{t.badge>0&&<span style={{background:"var(--dngr-bg)",color:"var(--dngr)",borderRadius:10,padding:"1px 5px",fontSize:10,fontWeight:700,fontFamily:M}}>{t.badge}</span>}
        </div>)}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
        <div style={{fontSize:10,fontFamily:M,color:saving?"var(--warn)":savedOk?"var(--succ)":"var(--muted)",display:"flex",alignItems:"center",gap:4}}>
          <span style={{display:"inline-block",width:6,height:6,borderRadius:"50%",background:saving?"var(--warn-bdr)":savedOk?"var(--succ-bdr)":"var(--bdrMd)",animation:saving?"pulse 0.7s ease infinite":"none"}}/>
          {saving?"...":savedOk?"✓":""}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{background:ROLES[role]?.bg,color:ROLES[role]?.color,padding:"4px 10px",borderRadius:"var(--r)",fontSize:11,fontFamily:M,fontWeight:600,border:"0.5px solid var(--bdrMd)"}}>
            {loggedUser?.name||"—"} · {ROLES[role]?.label}
          </div>
          <button onClick={handleLogout} style={{background:"var(--dngr-bg)",color:"var(--dngr)",border:"0.5px solid var(--dngr-bdr)",borderRadius:"var(--r)",padding:"4px 10px",fontSize:11,fontFamily:M,fontWeight:600,cursor:"pointer"}}>Salir</button>
        </div>
      </div>
    </div>
    {/* PAGE CONTENT */}
    
    {cur==="dashboard"&&<Dashboard projects={projects} timeEntries={timeEntries} workers={workers} purchases={purchases} expenses={expenses} reimb={reimb}/>}
    {cur==="payapps"&&<PayApps projects={projects} setProjects={setProjects} role={role}/>}
    {cur==="estimates"&&<Estimates estimates={estimates} setEstimates={setEstimates} role={role}/>}
    {cur==="personnel"&&<Personnel projects={projects} workers={workers} setWorkers={setWorkers} pending={pending} setPending={setPending} timeEntries={timeEntries} setTimeEntries={setTimeEntries} role={role} addToast={addToast}/>}
    {cur==="reimb"&&<Reimbursables projects={projects} setProjects={setProjects} reimb={reimb} setReimb={setReimb} role={role}/>}
    {cur==="compras"&&<Compras projects={projects} purchases={purchases} setPurchases={setPurchases} expenses={expenses} setExpenses={setExpenses} role={role}/>}
    {cur==="settings"&&<Settings projects={projects} setProjects={setProjects} workers={workers} setWorkers={setWorkers} onReset={reset}/>}
      <div style={{marginTop:32,paddingTop:16,borderTop:"0.5px solid var(--bdr)",textAlign:"center",fontSize:11,color:"var(--muted)",fontFamily:M}}>N&W Construction Corp · v9.0 — Cloud ☁️</div>
    {/* MOBILE BOTTOM NAV */}
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:"var(--bg)",borderTop:"1px solid var(--bdr)",display:"flex",zIndex:200,boxShadow:"0 -2px 12px rgba(0,0,0,0.08)",padding:"4px 0 env(safe-area-inset-bottom)"}}>
      {visTabs.slice(0,Math.min(visTabs.length,5)).map(t=>{const icons={dashboard:"🏠",payapps:"📄",estimates:"📋",personnel:"⏱",reimb:"🧾",compras:"🛒",settings:"⚙️"};return<div key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"6px 2px",cursor:"pointer",position:"relative"}}>
        <div style={{fontSize:20,marginBottom:2,filter:cur===t.id?"none":"grayscale(1)",opacity:cur===t.id?1:0.5}}>{icons[t.id]||"•"}</div>
        <div style={{fontSize:9,fontFamily:M,fontWeight:600,color:cur===t.id?rc.color:"var(--muted)",textAlign:"center",lineHeight:1.2}}>{t.label.split(" ")[0]}</div>
        {t.badge>0&&<span style={{position:"absolute",top:4,right:"20%",background:"var(--dngr-bdr)",color:"white",borderRadius:"50%",width:16,height:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700}}>{t.badge}</span>}
      </div>;})}
      {visTabs.length>5&&<div onClick={()=>setTab(visTabs[5]?.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"6px 2px",cursor:"pointer"}}>
        <div style={{fontSize:20,marginBottom:2,opacity:0.5}}>⚙️</div>
        <div style={{fontSize:9,fontFamily:M,color:"var(--muted)"}}>Más</div>
      </div>}
    </div>
  </div>;
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
